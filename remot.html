<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RasFocus Pro - Admin Console</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #0b57d0; --primary-soft: #e8f0fe; --surface: #ffffff; --surface-2: #f7f9fc;
            --bg: #eef2f7; --text: #122033; --muted: #617086; --border: #dde5ef;
            --success: #13a56b; --success-soft: #ddf7ec; --danger: #dc3c3c; --danger-soft: #ffe5e5;
            --warning: #f5a623; --warning-soft: #fff1d8; --trial: #7c5cff; --trial-soft: #ece8ff;
            --shadow: 0 10px 30px rgba(18, 32, 51, 0.08); --radius: 18px;
            --sidebar-width: 380px; --header-height: 76px;
        }

        * { box-sizing: border-box; }
        html, body { height: 100%; }
        body { margin: 0; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }
        button, input, textarea { font-family: inherit; }

        .app-shell { display: flex; flex-direction: column; height: 100vh; }
        .topbar { height: var(--header-height); padding: 14px 20px; background: linear-gradient(135deg, #0b57d0, #1a73e8); color: #fff; display: flex; align-items: center; justify-content: space-between; gap: 16px; box-shadow: 0 6px 20px rgba(11, 87, 208, 0.22); position: relative; z-index: 10; }
        .brand-block { display: flex; align-items: center; gap: 14px; min-width: 0; }
        .brand-icon { width: 46px; height: 46px; border-radius: 14px; background: rgba(255,255,255,0.18); display: grid; place-items: center; font-size: 22px; flex-shrink: 0; }
        .brand-text h1 { margin: 0; font-size: 20px; font-weight: 700; letter-spacing: 0.2px; }
        .brand-text p { margin: 3px 0 0; font-size: 12px; color: rgba(255,255,255,0.82); }
        .topbar-actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; justify-content: flex-end; }
        .admin-chip { display: inline-flex; align-items: center; gap: 8px; padding: 10px 14px; background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.2); border-radius: 999px; font-size: 13px; font-weight: 600; white-space: nowrap; }

        .primary-btn, .secondary-btn, .ghost-btn, .danger-btn, .success-btn { border: 0; border-radius: 12px; padding: 11px 14px; font-weight: 600; cursor: pointer; transition: 0.2s ease; display: inline-flex; align-items: center; justify-content: center; gap: 8px; }
        .primary-btn { background: var(--primary); color: #fff; }
        .primary-btn:hover { background: #0842a0; transform: translateY(-1px); }
        .secondary-btn { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
        .ghost-btn { background: transparent; color: var(--muted); border: 1px solid var(--border); }
        .danger-btn { background: var(--danger); color: #fff; }
        .success-btn { background: var(--success); color: #fff; }

        .workspace { display: flex; min-height: 0; flex: 1; padding: 18px; gap: 18px; }
        .sidebar { width: var(--sidebar-width); min-width: 320px; max-width: 420px; background: var(--surface); border-radius: 24px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 0; overflow: hidden; border: 1px solid rgba(255,255,255,0.7); }
        .sidebar-head { padding: 18px; border-bottom: 1px solid var(--border); background: linear-gradient(180deg, #ffffff, #fbfcfe); }
        .toolbar-grid { display: grid; grid-template-columns: 1fr auto; gap: 12px; margin-bottom: 12px; }
        .search-wrap { position: relative; }
        .search-wrap input { width: 100%; border: 1px solid var(--border); background: var(--surface-2); border-radius: 14px; padding: 13px 14px 13px 42px; outline: none; font-size: 14px; color: var(--text); }
        .search-wrap span { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 15px; }
        
        .quick-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .mini-stat { padding: 12px; border-radius: 16px; background: var(--surface-2); border: 1px solid var(--border); }
        .mini-stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
        .mini-stat .value { font-size: 22px; font-weight: 700; }

        .list-wrap { flex: 1; min-height: 0; overflow: auto; background: #fbfcff; }
        .list-item { display: grid; grid-template-columns: 52px minmax(0, 1fr) auto; gap: 12px; padding: 14px 18px; border-bottom: 1px solid #eef2f7; cursor: pointer; transition: 0.18s ease; align-items: center; }
        .list-item:hover { background: #f6f9ff; }
        .list-item.active { background: #edf4ff; border-left: 4px solid var(--primary); padding-left: 14px; }
        .avatar { width: 52px; height: 52px; border-radius: 18px; background: linear-gradient(135deg, #dbe8ff, #bfd5ff); color: var(--primary); display: grid; place-items: center; font-weight: 700; font-size: 18px; }
        .item-main h3 { margin: 0; font-size: 15px; line-height: 1.3; }
        .device-code { display: inline-block; background: #eef3fb; border-radius: 8px; padding: 4px 8px; margin-top: 6px; font-family: monospace; font-size: 11px; color: var(--muted); max-width: 100%; overflow: hidden; text-overflow: ellipsis; }
        .status-stack { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
        .status-badge { font-size: 10px; font-weight: 700; text-transform: uppercase; padding: 5px 8px; border-radius: 999px; }
        .status-APPROVED { background: var(--success-soft); color: #0a7b50; }
        .status-REVOKED { background: var(--danger-soft); color: #b22323; }
        .status-TRIAL { background: var(--trial-soft); color: #5d43d7; }
        .status-active { background: #e2f8ea; color: #0b8b55; }
        .status-inactive { background: #edf1f6; color: #68768b; }

        .detail-panel { flex: 1; min-width: 0; background: var(--surface); border-radius: 24px; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
        .detail-header { padding: 22px 24px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; gap: 18px; background: linear-gradient(180deg, #ffffff, #fbfdff); }
        .detail-title { display: flex; align-items: center; gap: 16px; min-width: 0; }
        .detail-meta h2 { margin: 0; font-size: 22px; }
        .detail-meta p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }

        .detail-content { padding: 22px 24px 28px; overflow: auto; background: #fbfcff; flex: 1; }
        .panel-grid { display: grid; grid-template-columns: repeat(12, 1fr); gap: 16px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 18px; box-shadow: 0 5px 16px rgba(18, 32, 51, 0.04); }
        .span-4 { grid-column: span 4; } .span-6 { grid-column: span 6; } .span-12 { grid-column: span 12; }
        .card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .card-title { font-size: 15px; font-weight: 700; margin: 0; }
        
        .tracker-box { background: var(--surface-2); border: 1px solid var(--border); border-radius: 18px; padding: 16px; display: grid; gap: 10px; }
        .tracker-pill { display: inline-flex; align-items: center; gap: 8px; width: fit-content; border-radius: 999px; padding: 8px 12px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .pill-green { background: #dff8ea; color: #0a8c57; }
        .pill-gray { background: #edf1f6; color: #627086; }
        .pill-yellow { background: var(--warning-soft); color: #b46e00; }
        .pill-blue { background: #e0f2fe; color: #0369a1; }
        .pill-danger { background: var(--danger-soft); color: var(--danger); }

        .input, .textarea { width: 100%; border: 1px solid var(--border); background: #fff; border-radius: 12px; padding: 12px 14px; font-size: 14px; color: var(--text); outline: none; transition: 0.2s; }
        .input:focus, .textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
        .textarea { min-height: 100px; resize: vertical; }

        .chat-stream { height: 260px; overflow-y: auto; padding: 14px; border-radius: 18px; border: 1px solid var(--border); background: #fff; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 85%; padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.5; }
        .bubble.user { align-self: flex-start; background: #f1f5f9; color: var(--text); border-bottom-left-radius: 4px; }
        .bubble.admin { align-self: flex-end; background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
        
        .placeholder { height: 100%; display: grid; place-items: center; text-align: center; color: var(--muted); }
        .placeholder-emoji { font-size: 56px; margin-bottom: 12px; }

        .mobile-detail-overlay { position: fixed; inset: 0; background: rgba(10, 18, 30, 0.5); z-index: 30; display: none; }
        .mobile-detail-overlay.open { display: block; }
        .mobile-sheet { position: absolute; inset: 0; background: var(--surface); overflow: auto; display: flex; flex-direction: column;}
        .mobile-topline { display: none; align-items: center; justify-content: space-between; padding: 12px 16px; border-bottom: 1px solid var(--border); background: #fff; position: sticky; top: 0; z-index: 5; }

        @media (max-width: 900px) {
            .detail-panel.desktop-detail { display: none; }
            .sidebar { width: 100%; max-width: none; border-radius: 0; }
            .mobile-topline { display: flex; }
            .workspace { padding: 0; }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <div class="brand-block">
                <div class="brand-icon">🛡️</div>
                <div class="brand-text">
                    <h1>RasFocus Pro Console</h1>
                    <p>Live Monitoring & Smart Control Panel</p>
                </div>
            </div>
            <div class="topbar-actions">
                <div class="admin-chip">👤 Admin: Rasel Mia</div>
            </div>
        </header>

        <main class="workspace">
            <aside class="sidebar">
                <div class="sidebar-head">
                    <div class="toolbar-grid">
                        <label class="search-wrap">
                            <span>🔍</span>
                            <input type="text" id="searchInput" placeholder="Search device..." oninput="filterUsers()" />
                        </label>
                        <button class="secondary-btn" onclick="refreshSelection()">↻</button>
                    </div>
                    <div class="quick-stats">
                        <div class="mini-stat"><div class="label">Devices</div><div class="value" id="statTotal">0</div></div>
                        <div class="mini-stat"><div class="label">Approved</div><div class="value" id="statApproved">0</div></div>
                        <div class="mini-stat"><div class="label">Active</div><div class="value" id="statActive">0</div></div>
                    </div>
                </div>
                <div class="list-wrap" id="userList">
                    <div class="placeholder">Loading data...</div>
                </div>
            </aside>

            <section class="detail-panel desktop-detail" id="desktopDetail">
                <div class="placeholder">
                    <div class="placeholder-inner"><div class="placeholder-emoji">📲</div><h2>Select a device</h2></div>
                </div>
            </section>
        </main>
    </div>

    <div class="mobile-detail-overlay" id="mobileOverlay">
        <div class="mobile-sheet">
            <div class="mobile-topline">
                <strong>Device Detail</strong>
                <button class="ghost-btn" onclick="closeMobileDetail()">✕ Back</button>
            </div>
            <section id="mobileDetailMount" style="flex:1"></section>
        </div>
    </div>

    <script>
        if (sessionStorage.getItem('admin_logged_in') !== 'true') window.location.href = 'index.html';

        const firebaseConfig = {
            apiKey: "AIzaSyDGd3KAo45UuqmeGFALziz_oKm3htEASHY",
            authDomain: "mywebtools-f8d53.firebaseapp.com",
            projectId: "mywebtools-f8d53"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let allUsersData = {};
        let selectedDeviceId = null;

        function escapeHtml(val) { return String(val ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
        function getInitials(name) { return (name || 'U').trim().substring(0, 2).toUpperCase(); }

        function renderUserList() {
            const q = document.getElementById('searchInput')?.value?.trim().toLowerCase() || '';
            const ids = Object.keys(allUsersData).filter(id => {
                const u = allUsersData[id];
                return [id, u.profileName, u.userEmail].join(' ').toLowerCase().includes(q);
            });

            document.getElementById('statTotal').textContent = ids.length;
            document.getElementById('statApproved').textContent = ids.filter(id => allUsersData[id].status === 'APPROVED').length;
            document.getElementById('statActive').textContent = ids.filter(id => allUsersData[id].isSelfControlActive).length;

            const mount = document.getElementById('userList');
            mount.innerHTML = ids.map(id => {
                const u = allUsersData[id];
                return `
                    <div class="list-item ${selectedDeviceId === id ? 'active' : ''}" onclick="selectUser('${id}')">
                        <div class="avatar">${getInitials(u.profileName)}</div>
                        <div class="item-main">
                            <h3>${escapeHtml(u.profileName || 'Unnamed')}</h3>
                            <div class="device-code">${id}</div>
                        </div>
                        <div class="status-stack">
                            <span class="status-badge status-${u.status || 'TRIAL'}">${u.status || 'TRIAL'}</span>
                            <span class="status-badge ${u.isSelfControlActive ? 'status-active' : 'status-inactive'}">${u.isSelfControlActive ? 'ON' : 'Idle'}</span>
                        </div>
                    </div>
                `;
            }).join('');
            renderDetail();
        }

        function buildDetailMarkup(id) {
            const req = allUsersData[id];
            if (!req) return `<div class="placeholder">Device not found</div>`;

            const isLockedByAdmin = (req.adminCmd === 'START_FOCUS' || req.adminCmd === 'ACK_START');
            const isLockedByFriend = (req.isSelfControlActive && req.activeModeType === 'Password' && !isLockedByAdmin);
            const isTimerOrPomo = (req.isSelfControlActive && (req.activeModeType === 'Timer' || req.activeModeType === 'Pomodoro'));
            
            const currentPass = req.livePassword || req.adminPass || 'No Pass';

            return `
                <div class="detail-header">
                    <div class="detail-title">
                        <div class="avatar">${getInitials(req.profileName)}</div>
                        <div class="detail-meta">
                            <h2>${escapeHtml(req.profileName || 'Unnamed')}</h2>
                            <p>${id} • ${escapeHtml(req.status)}</p>
                        </div>
                    </div>
                    <div class="header-actions">
                        ${req.status === 'APPROVED' 
                            ? `<button class="danger-btn" onclick="updateField('${id}', {status:'REVOKED'})">Revoke</button>`
                            : `<button class="success-btn" onclick="updateField('${id}', {status:'APPROVED'})">Approve</button>`}
                    </div>
                </div>
                <div class="detail-content">
                    <div class="panel-grid">
                        
                        <div class="card span-4">
                            <div class="card-header"><h3 class="card-title">Lock & Override Control</h3></div>
                            ${isLockedByAdmin ? `
                                <div class="tracker-box" style="background:var(--danger-soft); border-color:#ffcaca">
                                    <span class="tracker-pill pill-danger">🔒 Locked by Developer</span>
                                    <div class="kv-list" style="margin-top:10px">
                                        <div class="kv-row"><strong>Active Password:</strong><code>${escapeHtml(currentPass)}</code></div>
                                    </div>
                                    <div style="display:grid; gap:8px; margin-top:10px">
                                        <input class="input" id="newPass_${id}" placeholder="Change password...">
                                        <div style="display:flex; gap:8px">
                                            <button class="primary-btn" style="flex:1" onclick="relockDevice('${id}')">Update & Relock</button>
                                            <button class="danger-btn" style="flex:1" onclick="unlockDevice('${id}')">Unlock</button>
                                        </div>
                                    </div>
                                </div>
                            ` : (isLockedByFriend ? `
                                <div class="tracker-box" style="background:var(--primary-soft); border-color:#cce0ff">
                                    <span class="tracker-pill pill-blue">👤 Locked by Friend</span>
                                    <div class="kv-list" style="margin-top:10px">
                                        <div class="kv-row"><strong>User's Password:</strong><code>${escapeHtml(currentPass)}</code></div>
                                    </div>
                                    <div style="display:grid; gap:8px; margin-top:10px">
                                        <input class="input" id="newPass_${id}" placeholder="Override with new pass...">
                                        <div style="display:flex; gap:8px">
                                            <button class="primary-btn" style="flex:1" onclick="relockDevice('${id}')">Take Over & Relock</button>
                                            <button class="danger-btn" style="flex:1" onclick="unlockDevice('${id}')">Force Unlock</button>
                                        </div>
                                    </div>
                                </div>
                            ` : `
                                <div class="tracker-box">
                                    <span class="tracker-pill pill-gray">🔓 Device Unlocked</span>
                                    <div style="display:grid; gap:8px; margin-top:10px">
                                        <label class="field-label">Set Lock Password</label>
                                        <div style="display:flex; gap:8px">
                                            <input class="input" id="newPass_${id}" placeholder="Type password...">
                                            <button class="primary-btn" onclick="relockDevice('${id}')">Lock PC</button>
                                        </div>
                                    </div>
                                </div>
                            `)}
                        </div>

                        <div class="card span-4">
                            <div class="card-header"><h3 class="card-title">Live State</h3></div>
                            <div class="tracker-box">
                                <span class="tracker-pill ${req.isSelfControlActive ? 'pill-green' : 'pill-gray'}">${req.isSelfControlActive ? '🟢 Focus ON' : '⚪ Idle'}</span>
                                <div class="kv-list">
                                    <div class="kv-row"><strong>Mode:</strong><span>${escapeHtml(req.activeModeType || 'None')}</span></div>
                                    <div class="kv-row"><strong>Time Left:</strong><span>${escapeHtml(req.timeRemaining || '--')}</span></div>
                                </div>
                            </div>
                        </div>

                        <div class="card span-4">
                            <div class="card-header"><h3 class="card-title">Live Chat</h3></div>
                            <div class="chat-stream" id="chat_${id}">
                                ${req.liveChatUser ? `<div class="bubble user"><strong>User:</strong><br>${escapeHtml(req.liveChatUser)}</div>` : ''}
                                ${req.liveChatAdmin ? `<div class="bubble admin"><strong>Me:</strong><br>${escapeHtml(req.liveChatAdmin)}</div>` : ''}
                            </div>
                            <div style="display:flex; gap:8px; margin-top:10px">
                                <input class="input" id="chatIn_${id}" placeholder="Reply..." onkeypress="if(event.key==='Enter') sendChat('${id}')">
                                <button class="primary-btn" onclick="sendChat('${id}')">Send</button>
                            </div>
                        </div>

                        <div class="card span-6">
                            <div class="card-header"><h3 class="card-title">Broadcast Notice</h3></div>
                            <textarea class="textarea" id="msg_${id}" placeholder="Message on app dashboard...">${escapeHtml(req.adminMessage)}</textarea>
                            <button class="secondary-btn" style="margin-top:10px" onclick="updateField('${id}', {adminMessage: document.getElementById('msg_${id}').value})">💾 Save Notice</button>
                        </div>

                        <div class="card span-6">
                            <div class="card-header"><h3 class="card-title">Force Popup</h3></div>
                            <textarea class="textarea" id="pop_${id}" placeholder="Instant screen popup..."></textarea>
                            <div style="display:flex; gap:8px; margin-top:10px">
                                <button class="success-btn" onclick="updateField('${id}', {broadcastMsg: document.getElementById('pop_${id}').value})">Send to PC</button>
                                <button class="danger-btn" onclick="broadcastAll()">🚀 Global Push</button>
                            </div>
                        </div>

                    </div>
                </div>
            `;
        }

        function renderDetail() {
            const html = buildDetailMarkup(selectedDeviceId);
            document.getElementById('desktopDetail').innerHTML = html;
            document.getElementById('mobileDetailMount').innerHTML = html;
            const chat = document.getElementById(`chat_${selectedDeviceId}`);
            if (chat) chat.scrollTop = chat.scrollHeight;
        }

        function selectUser(id) { selectedDeviceId = id; renderUserList(); if (window.innerWidth <= 900) document.getElementById('mobileOverlay').classList.add('open'); }
        function closeMobileDetail() { document.getElementById('mobileOverlay').classList.remove('open'); }
        function filterUsers() { renderUserList(); }
        function refreshSelection() { renderUserList(); }

        // --- Firebase Actions ---
        function updateField(id, data) { db.collection('subscription_requests').doc(id).update(data); }

        function relockDevice(id) {
            const pass = document.getElementById(`newPass_${id}`).value.trim();
            if (!pass) return alert('Enter password!');
            updateField(id, { adminCmd: 'START_FOCUS', adminPass: pass, livePassword: pass });
            alert('Relock Command Sent!');
        }

        function unlockDevice(id) {
            if (confirm('Unlock this device?')) updateField(id, { adminCmd: 'STOP_FOCUS', livePassword: '' });
        }

        function sendChat(id) {
            const msg = document.getElementById(`chatIn_${id}`).value.trim();
            if (msg) updateField(id, { liveChatAdmin: msg });
        }

        function broadcastAll() {
            const msg = prompt("Enter global popup message:");
            if (!msg) return;
            db.collection('subscription_requests').get().then(snap => {
                const batch = db.batch();
                snap.forEach(doc => batch.update(doc.ref, { broadcastMsg: msg }));
                batch.commit().then(() => alert('Sent to all!'));
            });
        }

        db.collection('subscription_requests').onSnapshot(snap => {
            snap.forEach(doc => allUsersData[doc.id] = doc.data());
            if (!selectedDeviceId && Object.keys(allUsersData).length) selectedDeviceId = Object.keys(allUsersData)[0];
            renderUserList();
        });
    </script>
</body>
</html>
