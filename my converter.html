<script>
        const { PDFDocument, rgb, degrees } = PDFLib;

        // --- Helper functions ---
        const readFileAsync = (file) => {
            return new Promise((resolve, reject) => {
                let reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsArrayBuffer(file);
            });
        };

        const readImageAsync = (file) => {
            return new Promise((resolve, reject) => {
                let reader = new FileReader();
                reader.onload = () => resolve(reader.result);
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        };

        // --- PDF Merger Variables & Functions ---
        let selectedPDFs = [];
        let dragStartIndex = -1;

        function handlePDFSelection(event) {
            const files = event.target.files;
            if (files.length > 0) {
                for (let i = 0; i < files.length; i++) {
                    selectedPDFs.push(files[i]);
                }
                renderPDFList();
            }
            event.target.value = ''; 
        }

        function renderPDFList() {
            const listContainer = document.getElementById('pdf-list');
            const mergeBtn = document.getElementById('merge-btn');
            listContainer.innerHTML = '';

            if (selectedPDFs.length === 0) {
                mergeBtn.classList.add('hidden');
                listContainer.innerHTML = '<p class="text-xs text-center text-gray-400 py-4 italic">No files selected yet.</p>';
                return;
            }

            if (selectedPDFs.length >= 2) {
                mergeBtn.classList.remove('hidden');
            } else {
                mergeBtn.classList.add('hidden');
            }

            selectedPDFs.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'flex items-center justify-between bg-white border border-gray-200 rounded-lg p-3 shadow-sm cursor-grab transition-all group';
                li.draggable = true;
                
                li.ondragstart = (e) => dragStart(e, index);
                li.ondragover = (e) => dragOver(e);
                li.ondragleave = (e) => dragLeave(e);
                li.ondrop = (e) => drop(e, index);

                let fileName = file.name;
                if(fileName.length > 25) fileName = fileName.substring(0, 22) + '...';

                li.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden">
                        <i class="fa-solid fa-grip-vertical text-gray-300 group-hover:text-gray-500 cursor-grab"></i>
                        <span class="text-sm font-semibold text-gray-700 truncate" title="${file.name}">${fileName}</span>
                    </div>
                    <div class="flex items-center gap-1 shrink-0">
                        <button onclick="moveUp(${index})" class="w-7 h-7 rounded bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition-colors disabled:opacity-30 disabled:cursor-not-allowed" ${index === 0 ? 'disabled' : ''}>
                            <i class="fa-solid fa-caret-up"></i>
                        </button>
                        <button onclick="moveDown(${index})" class="w-7 h-7 rounded bg-gray-100 hover:bg-gray-200 text-gray-600 flex items-center justify-center transition-colors disabled:opacity-30 disabled:cursor-not-allowed" ${index === selectedPDFs.length - 1 ? 'disabled' : ''}>
                            <i class="fa-solid fa-caret-down"></i>
                        </button>
                        <button onclick="removeFile(${index})" class="w-7 h-7 rounded bg-red-50 hover:bg-red-500 text-red-500 hover:text-white flex items-center justify-center transition-colors ml-1">
                            <i class="fa-solid fa-xmark"></i>
                        </button>
                    </div>
                `;
                listContainer.appendChild(li);
            });
        }

        function dragStart(e, index) { dragStartIndex = index; e.dataTransfer.effectAllowed = 'move'; }
        function dragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
        function dragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
        function drop(e, targetIndex) {
            e.preventDefault(); e.currentTarget.classList.remove('drag-over');
            if (dragStartIndex === targetIndex) return;
            const draggedItem = selectedPDFs.splice(dragStartIndex, 1)[0];
            selectedPDFs.splice(targetIndex, 0, draggedItem);
            renderPDFList();
        }

        window.moveUp = (index) => { if (index === 0) return; const item = selectedPDFs.splice(index, 1)[0]; selectedPDFs.splice(index - 1, 0, item); renderPDFList(); }
        window.moveDown = (index) => { if (index === selectedPDFs.length - 1) return; const item = selectedPDFs.splice(index, 1)[0]; selectedPDFs.splice(index + 1, 0, item); renderPDFList(); }
        window.removeFile = (index) => { selectedPDFs.splice(index, 1); renderPDFList(); }

        window.executeMerge = async () => {
            const btn = document.getElementById('merge-btn');
            if (selectedPDFs.length < 2) { alert("Please select at least 2 PDFs to merge."); return; }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Processing...';

            try {
                const { PDFDocument } = PDFLib;
                const mergedPdf = await PDFDocument.create();

                for (let file of selectedPDFs) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdfDoc = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdfDoc, pdfDoc.getPageIndices());
                    copiedPages.forEach((page) => mergedPdf.addPage(page));
                }

                const mergedPdfFile = await mergedPdf.save();
                const blob = new Blob([mergedPdfFile], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);
                const filename = 'Merged_Document_RaselTools.pdf';

                const area = document.getElementById('merge-download-area');
                area.style.display = 'block';
                area.innerHTML = `
                    <span class="success-badge">✅ Merged Successfully!</span>
                    <a href="${url}" download="${filename}" class="btn-download" style="text-decoration:none;">
                        ⬇️ Download Merged PDF
                    </a>`;

                btn.innerHTML = '<i class="fa-solid fa-check"></i> Merged Successfully!';
                setTimeout(() => {
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-layer-group"></i> Merge PDFs Now';
                }, 2000);

            } catch (error) {
                console.error("Merging error:", error);
                alert("Error merging PDFs. Ensure they are valid PDF files without passwords.");
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-layer-group"></i> Merge PDFs Now';
            }
        };

        // --- Other Tool Functions ---

        async function splitPDF() {
            const fileInput = document.getElementById('split-file');
            const startPage = parseInt(document.getElementById('split-start').value);
            const endPage = parseInt(document.getElementById('split-end').value);

            if (!fileInput.files[0] || !startPage || !endPage) return alert("Please select file and page range");

            const pdfBytes = await readFileAsync(fileInput.files[0]);
            const pdfDoc = await PDFDocument.load(pdfBytes);
            const newPdf = await PDFDocument.create();

            const totalPages = pdfDoc.getPageCount();
            if(startPage < 1 || endPage > totalPages || startPage > endPage) return alert("Invalid page range");

            const range = [];
            for (let i = startPage - 1; i < endPage; i++) range.push(i);

            const copiedPages = await newPdf.copyPages(pdfDoc, range);
            copiedPages.forEach((page) => newPdf.addPage(page));

            const pdfData = await newPdf.save();
            const blob = new Blob([pdfData], { type: 'application/pdf' });
            const filename = `split_pages_${startPage}-${endPage}.pdf`;
            const url = URL.createObjectURL(blob);

            const area = document.getElementById('split-download-area');
            area.style.display = 'block';
            area.innerHTML = `
                <span class="success-badge">✅ Ready!</span>
                <a href="${url}" download="${filename}" class="btn-download" style="text-decoration:none;">
                    ⬇️ Download PDF (Pages ${startPage}–${endPage})
                </a>`;
        }

        function customResize() {
            const fileInput = document.getElementById('resize-file');
            const w = parseInt(document.getElementById('resize-w').value);
            const h = parseInt(document.getElementById('resize-h').value);

            if(!fileInput.files[0] || !w || !h) return alert("Select file and enter dimensions.");
            processImage(w, h, `resized_${w}x${h}.jpg`, 'resize-file', 'resize-download-area');
        }

        function generateQR() {
            const text = document.getElementById('qr-text').value;
            const container = document.getElementById('qr-result');
            container.innerHTML = "";
            const area = document.getElementById('qr-download-area');
            area.style.display = 'none';
            
            if(!text) return alert("Enter text");

            new QRCode(container, {
                text: text,
                width: 128,
                height: 128
            });

            setTimeout(() => {
                const img = container.querySelector('img');
                if(img) {
                    area.style.display = 'block';
                    area.innerHTML = `
                        <span class="success-badge">✅ QR Code Ready!</span>
                        <a href="${img.src}" download="qrcode.png" class="btn-download" style="text-decoration:none;">
                            ⬇️ Download QR Code
                        </a>`;
                }
            }, 500);
        }

        function readQRCode() {
            const fileInput = document.getElementById('qr-input-file');
            const resultBox = document.getElementById('qr-reader-result');

            if (!fileInput.files[0]) return alert("Select an image with QR code");

            const html5QrCode = new Html5Qrcode("qr-reader-dummy-id"); 
            
            html5QrCode.scanFile(fileInput.files[0], true)
            .then(decodedText => {
                resultBox.innerHTML = `<div class="bg-green-100 text-green-700 p-2 rounded mt-2"><strong>Result:</strong><br>${decodedText}</div>`;
                const copyBtn = document.createElement('button');
                copyBtn.innerText = "Copy Text";
                copyBtn.className = "text-xs mt-1 text-blue-600 underline";
                copyBtn.onclick = () => {
                     navigator.clipboard.writeText(decodedText);
                     alert("Copied!");
                };
                resultBox.appendChild(copyBtn);
            })
            .catch(err => {
                resultBox.innerHTML = `<div class="text-red-500 mt-2">Error: Could not read QR code. Ensure image is clear.</div>`;
                console.error(err);
            });
        }

        async function convertPdfToPng() {
            const fileInput = document.getElementById('pdf-to-img-file');
            let pageNum = parseInt(document.getElementById('pdf-page-num').value) || 1;

            if (!fileInput.files[0]) return alert("Select a PDF file");

            const file = fileInput.files[0];
            const fileReader = new FileReader();

            fileReader.onload = async function() {
                const typedarray = new Uint8Array(this.result);
                try {
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    if (pageNum > pdf.numPages) {
                        alert(`Error: PDF only has ${pdf.numPages} pages.`);
                        return;
                    }
                    const page = await pdf.getPage(pageNum);
                    const viewport = page.getViewport({ scale: 2.0 });
                    const canvas = document.createElement('canvas');
                    const context = canvas.getContext('2d');
                    canvas.height = viewport.height;
                    canvas.width = viewport.width;

                    const renderContext = { canvasContext: context, viewport: viewport };
                    await page.render(renderContext).promise;

                    canvas.toBlob(function(blob) {
                        const filename = `page_${pageNum}.png`;
                        const url = URL.createObjectURL(blob);
                        const area = document.getElementById('pdfpng-download-area');
                        if (area) {
                            area.style.display = 'block';
                            area.innerHTML = `
                                <span class="success-badge">✅ Page ${pageNum} converted!</span>
                                <a href="${url}" download="${filename}" class="btn-download" style="text-decoration:none;">
                                    ⬇️ Download PNG
                                </a>`;
                        } else {
                            saveAs(blob, filename);
                        }
                    }, 'image/png');

                } catch (error) {
                    console.error(error);
                    alert("Error processing PDF. See console.");
                }
            };
            fileReader.readAsArrayBuffer(file);
        }

        async function imagesToPDF() {
            const fileInput = document.getElementById('img-to-pdf-files');
            if (fileInput.files.length === 0) return alert("Select images");

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            for (let i = 0; i < fileInput.files.length; i++) {
                const dataUrl = await readImageAsync(fileInput.files[i]);
                const imgProps = doc.getImageProperties(dataUrl);
                const pdfWidth = doc.internal.pageSize.getWidth();
                const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;

                if (i > 0) doc.addPage();
                doc.addImage(dataUrl, 'JPEG', 0, 0, pdfWidth, pdfHeight);
            }

            const pdfBlob = doc.output('blob');
            const filename = "images_combined.pdf";
            const url = URL.createObjectURL(pdfBlob);

            const area = document.getElementById('imgpdf-download-area');
            area.style.display = 'block';
            area.innerHTML = `
                <span class="success-badge">✅ ${fileInput.files.length} image(s) combined!</span>
                <a href="${url}" download="${filename}" class="btn-download" style="text-decoration:none;">
                    ⬇️ Download PDF
                </a>`;
        }

        function processImage(targetW, targetH, filename, elementId, downloadAreaId) {
            const fileInput = document.getElementById(elementId);
            if (!fileInput.files[0]) return alert("Select an image");

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.getElementById('canvas');
                    canvas.width = targetW;
                    canvas.height = targetH;
                    const ctx = canvas.getContext('2d');
                    
                    ctx.fillStyle = "#FFFFFF";
                    ctx.fillRect(0,0, targetW, targetH);
                    ctx.drawImage(img, 0, 0, targetW, targetH);
                    
                    canvas.toBlob(function(blob) {
                        const url = URL.createObjectURL(blob);
                        if (downloadAreaId) {
                            const area = document.getElementById(downloadAreaId);
                            area.style.display = 'block';
                            area.innerHTML = `
                                <span class="success-badge">✅ ${targetW}×${targetH}px ready!</span>
                                <a href="${url}" download="${filename}" class="btn-download" style="text-decoration:none;">
                                    ⬇️ Download ${filename}
                                </a>`;
                        } else {
                            saveAs(blob, filename);
                        }
                    }, 'image/jpeg', 0.9);
                }
                img.src = event.target.result;
            }
            reader.readAsDataURL(fileInput.files[0]);
        }

        async function compressPDF() {
            const fileInput = document.getElementById('compress-file');
            if (!fileInput.files[0]) return alert("Please select a PDF");

            const pdfBytes = await readFileAsync(fileInput.files[0]);
            const pdfDoc = await PDFDocument.load(pdfBytes);
            const pdfData = await pdfDoc.save({ useObjectStreams: false }); 
            const blob = new Blob([pdfData], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const origKB = Math.round(fileInput.files[0].size / 1024);
            const newKB = Math.round(pdfData.length / 1024);

            const area = document.getElementById('compress-download-area');
            area.style.display = 'block';
            area.innerHTML = `
                <span class="success-badge">✅ ${origKB}KB → ${newKB}KB</span>
                <a href="${url}" download="compressed_doc.pdf" class="btn-download" style="text-decoration:none;">
                    ⬇️ Download Compressed PDF
                </a>`;
        }

        function calculateAge() {
            const dobInput = document.getElementById('age-dob').value;
            const targetInput = document.getElementById('age-target').value || new Date().toISOString().split('T')[0];
            
            if(!dobInput) return alert("Please select Date of Birth");

            const dob = new Date(dobInput);
            const target = new Date(targetInput);
            
            let years = target.getFullYear() - dob.getFullYear();
            let months = target.getMonth() - dob.getMonth();
            let days = target.getDate() - dob.getDate();

            if (days < 0) {
                months--;
                const prevMonth = new Date(target.getFullYear(), target.getMonth(), 0);
                days += prevMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            const resultBox = document.getElementById('age-result');
            resultBox.innerText = `${years} Years, ${months} Months, ${days} Days`;
            resultBox.classList.remove('hidden');
        }

        const dummyDiv = document.createElement('div');
        dummyDiv.id = "qr-reader-dummy-id";
        dummyDiv.style.display = "none";
        document.body.appendChild(dummyDiv);

    </script>
