<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Preparation & Premium Diary</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        night: '#121212', 
                        nightCard: '#1e1e1e',
                        nightBorder: '#333333',
                        diaryBg: '#1a1a1e', // Premium Dark Gray
                        diarySidebar: '#232329',
                        diaryText: '#e2e8f0', // Soft nice text color
                        diaryHighlight: '#f472b6' // Pinkish highlight
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; transition: background-color 0.3s ease, color 0.3s ease; }
        body:not(.dark) { background-color: #f0f4f8; }
        .bengali-text { font-family: 'Noto Serif Bengali', serif; }
        
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(255,255,255,0.3); }
        .dark .glass-nav { background: rgba(30, 30, 30, 0.85); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .tab-btn { position: relative; transition: all 0.3s ease; }
        
        /* Premium Diary Scrollbar */
        .diary-scroll::-webkit-scrollbar { width: 6px; }
        .diary-scroll::-webkit-scrollbar-track { background: transparent; }
        .diary-scroll::-webkit-scrollbar-thumb { background: #4a4a5a; border-radius: 10px; }
        .diary-scroll::-webkit-scrollbar-thumb:hover { background: #6a6a7a; }

        /* Loader */
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #8b5cf6; animation: spin 1s linear infinite; }
        .dark .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #a78bfa; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Custom Reader Classes */
        .book-reader { background-color: #fcf5e5; color: #2c2820; background-image: linear-gradient(to right, rgba(0,0,0,0.02) 1px, transparent 1px); }
        .dark .book-reader { background-color: #2d2d2d; color: #e5e7eb; background-image: none; }
        .book-title { border-bottom: 2px dashed #d3c3a5; padding-bottom: 15px; margin-bottom: 25px; }
        .dark .book-title { border-bottom: 2px dashed #555555; }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 dark:bg-night h-screen flex flex-col">

    <nav class="glass-nav shadow-sm z-10 sticky top-0">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="text-2xl font-bold flex items-center gap-2 text-blue-600 dark:text-blue-400">
                    <i class="fa-solid fa-graduation-cap"></i> PSC Portal
                </div>
                
                <div class="flex items-center gap-4">
                    <button id="theme-toggle" class="text-gray-500 dark:text-yellow-400 hover:text-purple-600 dark:hover:text-yellow-300 focus:outline-none transition text-xl w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-nightCard shadow-inner">
                        <i id="theme-icon" class="fa-solid fa-moon"></i>
                    </button>
                    <div class="md:hidden flex items-center">
                        <button id="mobile-menu-btn" class="text-gray-500 dark:text-gray-300 hover:text-purple-600 focus:outline-none transition">
                            <i class="fa-solid fa-bars text-2xl"></i>
                        </button>
                    </div>
                </div>
            </div>
            <div id="nav-tabs" class="hidden md:flex flex-wrap gap-2 md:gap-4 overflow-x-auto pb-2 mt-2"></div>
        </div>
    </nav>

    <main class="flex-grow p-4 md:p-8 overflow-y-auto w-full max-w-7xl mx-auto" id="main-content">
        <div class="flex justify-center items-center h-full" id="global-loader">
            <div class="spinner"></div>
            <span class="ml-4 text-lg font-medium text-gray-500 dark:text-gray-400">ডাটা লোড হচ্ছে...</span>
        </div>
    </main>

    <div id="reader-modal" class="fixed inset-0 bg-gray-900 bg-opacity-80 z-50 hidden flex flex-col opacity-0 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#252525] w-full h-full md:w-4/5 md:h-[90%] md:m-auto md:rounded-xl shadow-2xl flex flex-col overflow-hidden transform transition-transform duration-300 scale-95" id="reader-container">
            <div class="bg-gray-800 dark:bg-nightCard text-white p-3 md:p-4 flex justify-between items-center shrink-0 shadow-md">
                <div class="flex items-center gap-2 text-gray-300">
                    <i class="fa-solid fa-glasses text-purple-400"></i> <span class="hidden md:inline text-sm font-medium">রিডিং মুড</span>
                </div>
                <div class="flex items-center gap-2 md:gap-4">
                    <a id="reader-pdf-btn" href="#" target="_blank" class="hidden bg-red-600 text-white px-4 py-2 rounded-lg shadow hover:bg-red-500 text-sm font-semibold transition items-center gap-2">
                        <i class="fa-solid fa-file-pdf"></i> PDF
                    </a>
                    <button onclick="closeReaderUI()" class="w-10 h-10 rounded-lg bg-gray-700 hover:bg-red-500 hover:text-white transition text-xl flex justify-center items-center">&times;</button>
                </div>
            </div>
            <div class="p-6 md:p-12 overflow-y-auto flex-grow book-reader shadow-inner relative" id="reader-wrapper">
                <div class="max-w-3xl mx-auto">
                    <h1 id="reader-title" class="text-3xl md:text-4xl font-bold book-title text-center leading-snug">Title</h1>
                    <div id="reader-content" class="text-lg md:text-xl font-medium transition-all duration-300 text-justify"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, addDoc, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Theme Setup
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if(document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDGd3KAo45UuqmeGFALziz_oKm3htEASHY",
            authDomain: "mywebtools-f8d53.firebaseapp.com",
            projectId: "mywebtools-f8d53",
            storageBucket: "mywebtools-f8d53.firebasestorage.app"
        };
        const SYNC_APP_ID = "rasel-mia-universal-sync";
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/de2w78yxh/auto/upload";
        const CLOUDINARY_PRESET = "ml_default";

        // Main Categories (No Diary here, Diary is special)
        const categories = {
            bangla: { label: "বাংলা", icon: "fa-language text-green-500", subs: ["প্রবন্ধ", "ভাব সম্প্রসারণ", "পত্র ও দরখাস্ত", "ব্যাকরণ"] },
            english: { label: "English", icon: "fa-a text-blue-500", subs: ["Essay", "Letter & Application", "Grammar"] },
            bd_affairs: { label: "বাংলাদেশ বিষয়াবলি", icon: "fa-map-location-dot text-red-500", subs: ["সাধারণ জ্ঞান", "ইতিহাস"] },
            eee: { label: "EEE ডিপার্টমেন্ট", icon: "fa-bolt text-yellow-500", subs: ["Electrical", "Electronics"] }
        };

        // State
        let currentTab = 'diary'; // Default to Premium Diary
        let currentSub = '';
        let allData = [];
        let userAuth = null;
        let isAdminLoggedIn = false;
        
        // Diary State
        let activeDiaryId = null;
        let saveTimeout = null;

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = initializeFirestore(app, { localCache: persistentLocalCache({tabManager: persistentMultipleTabManager()}) });

        const navTabs = document.getElementById('nav-tabs');
        const mainContent = document.getElementById('main-content');
        document.getElementById('mobile-menu-btn').addEventListener('click', () => navTabs.classList.toggle('hidden'));

        async function init() {
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userAuth = user;
                        fetchData();
                        renderNavigation();
                        renderContent();
                    }
                });
            } catch (error) {
                console.error("Auth error:", error);
                mainContent.innerHTML = `<div class="text-red-500 text-center mt-10">Authentication failed. Check internet.</div>`;
            }
        }

        window.fetchData = function() {
            if (!userAuth) return;
            const dataRef = collection(db, 'artifacts', SYNC_APP_ID, 'public', 'data', 'psc_materials');
            onSnapshot(dataRef, (snapshot) => {
                allData = [];
                snapshot.forEach((doc) => { allData.push({ id: doc.id, ...doc.data() }); });
                allData.sort((a, b) => (b.createdAt?.toMillis() || 0) - (a.createdAt?.toMillis() || 0));
                if (currentTab !== 'diary' && currentTab !== 'admin') renderContent();
            });
        }

        function renderNavigation() {
            navTabs.innerHTML = '';
            
            // Premium Diary Tab
            const diaryBtn = document.createElement('button');
            diaryBtn.className = `tab-btn py-2.5 px-5 rounded-xl text-sm md:text-base whitespace-nowrap focus:outline-none flex items-center gap-2 transition-all font-bold shadow-sm border ${currentTab === 'diary' ? 'bg-gradient-to-r from-pink-600 to-purple-600 text-white border-transparent' : 'bg-white dark:bg-nightCard text-pink-600 dark:text-pink-400 border-gray-200 dark:border-nightBorder hover:bg-gray-100 dark:hover:bg-gray-700'}`;
            diaryBtn.innerHTML = '<i class="fa-solid fa-book-sparkles"></i> <span class="bengali-text">আমার ডায়েরি</span>';
            diaryBtn.onclick = () => { currentTab = 'diary'; currentSub = ''; renderNavigation(); renderContent(); };
            navTabs.appendChild(diaryBtn);

            // Other Categories
            Object.keys(categories).forEach(catKey => {
                const btn = document.createElement('button');
                btn.className = `tab-btn py-2.5 px-5 rounded-xl text-sm md:text-base whitespace-nowrap focus:outline-none flex items-center gap-2 transition-all font-semibold shadow-sm border ${currentTab === catKey ? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-nightCard text-gray-700 dark:text-gray-200 border-gray-200 dark:border-nightBorder hover:bg-gray-100 dark:hover:bg-gray-700'}`;
                btn.innerHTML = `<i class="fa-solid ${categories[catKey].icon} ${currentTab === catKey ? 'text-white' : ''}"></i> <span class="${catKey !== 'english' ? 'bengali-text font-medium' : ''}">${categories[catKey].label}</span>`;
                btn.onclick = () => { currentTab = catKey; currentSub = ''; renderNavigation(); renderContent(); };
                navTabs.appendChild(btn);
            });

            // Admin Tab
            const adminBtn = document.createElement('button');
            adminBtn.className = `tab-btn py-2.5 px-5 rounded-xl text-sm md:text-base whitespace-nowrap focus:outline-none flex items-center gap-2 transition-all font-semibold shadow-sm border ${currentTab === 'admin' ? 'bg-red-600 text-white border-red-600' : 'bg-white dark:bg-nightCard text-red-600 dark:text-red-400 border-gray-200 dark:border-nightBorder hover:bg-gray-100 dark:hover:bg-gray-700'}`;
            adminBtn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> <span class="bengali-text">অ্যাডমিন</span>';
            adminBtn.onclick = () => { currentTab = 'admin'; currentSub = ''; renderNavigation(); renderContent(); };
            navTabs.appendChild(adminBtn);
        }

        function renderContent() {
            mainContent.innerHTML = ''; 

            if (currentTab === 'diary') {
                renderPremiumDiary();
                return;
            }

            if (currentTab === 'admin') {
                isAdminLoggedIn ? renderAdminPanel() : renderAdminLogin();
                return;
            }

            // Normal Category Render Logic...
            const catData = categories[currentTab];
            const isBengali = currentTab !== 'english';
            
            const header = document.createElement('h1');
            header.className = `text-3xl font-bold mb-8 text-blue-700 dark:text-blue-400 border-b-2 border-gray-200 dark:border-nightBorder pb-3 flex items-center gap-3 w-fit ${isBengali ? 'bengali-text' : ''}`;
            header.innerHTML = `<i class="fa-solid ${catData.icon}"></i> ${catData.label}`;
            mainContent.appendChild(header);

            if (currentSub === '') {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6';
                catData.subs.forEach((sub, i) => {
                    const card = document.createElement('div');
                    card.className = `bg-indigo-600 hover:bg-indigo-700 p-6 rounded-2xl shadow-md cursor-pointer flex justify-between items-center transform hover:-translate-y-1 transition text-white`;
                    card.onclick = () => { currentSub = sub; renderContent(); };
                    card.innerHTML = `<h3 class="text-xl font-bold ${isBengali ? 'bengali-text' : ''}">${sub}</h3> <i class="fa-solid fa-arrow-right"></i>`;
                    grid.appendChild(card);
                });
                mainContent.appendChild(grid);
            } else {
                const backBtn = document.createElement('button');
                backBtn.className = `mb-6 text-white font-bold flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 px-6 py-2 rounded-xl shadow`;
                backBtn.innerHTML = `<i class="fa-solid fa-arrow-left"></i> ফিরে যান`;
                backBtn.onclick = () => { currentSub = ''; renderContent(); };
                mainContent.appendChild(backBtn);

                const items = allData.filter(d => d.mainCategory === currentTab && d.subCategory === currentSub);
                const list = document.createElement('div');
                list.className = 'space-y-4';
                items.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'bg-white dark:bg-nightCard p-5 rounded-2xl shadow border border-gray-100 dark:border-nightBorder flex justify-between items-center';
                    div.innerHTML = `<div class="font-bold text-lg dark:text-white ${isBengali ? 'bengali-text' : ''}">${item.title}</div>
                                     <button onclick='window.openReaderUI(${JSON.stringify(item)}, ${isBengali})' class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm font-bold">পড়ুন</button>`;
                    list.appendChild(div);
                });
                mainContent.appendChild(list);
            }
        }

        // ==========================================
        //         PREMIUM DIARY LOGIC
        // ==========================================
        function getDiaryData() {
            return JSON.parse(localStorage.getItem('premium_local_diary') || '[]');
        }

        function saveDiaryData(data) {
            localStorage.setItem('premium_local_diary', JSON.stringify(data));
        }

        function getTodayDateString() {
            const today = new Date();
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return today.toLocaleDateString('bn-BD', options); // Bengali date format
        }

        function getTodaySortKey() {
            const today = new Date();
            return `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
        }

        function renderPremiumDiary() {
            let diaryData = getDiaryData();
            const todayKey = getTodaySortKey();
            
            // Auto open/create today's entry
            let todayEntry = diaryData.find(d => d.dateKey === todayKey);
            if (!todayEntry) {
                todayEntry = {
                    id: 'diary_' + Date.now(),
                    dateKey: todayKey,
                    displayDate: getTodayDateString(),
                    title: '',
                    content: '',
                    timestamp: Date.now()
                };
                diaryData.unshift(todayEntry);
                saveDiaryData(diaryData);
            }
            
            // If nothing is active, set today as active
            if(!activeDiaryId) activeDiaryId = todayEntry.id;

            const activeEntry = diaryData.find(d => d.id === activeDiaryId) || todayEntry;

            const html = `
                <div class="flex flex-col md:flex-row h-[80vh] bg-diaryBg rounded-3xl overflow-hidden shadow-2xl border border-diarySidebar">
                    
                    <div class="w-full md:w-1/3 bg-diarySidebar flex flex-col border-r border-nightBorder/50">
                        <div class="p-5 border-b border-nightBorder/50 flex justify-between items-center bg-black/20">
                            <h2 class="text-white font-bold text-xl bengali-text flex items-center gap-2"><i class="fa-solid fa-book-journal-whills text-diaryHighlight"></i> ডায়েরি পাতা</h2>
                            <button onclick="window.createNewDiary()" class="bg-diaryHighlight hover:bg-pink-500 text-white w-10 h-10 rounded-full flex justify-center items-center shadow-lg transition" title="নতুন এন্ট্রি">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                        <div class="flex-grow overflow-y-auto diary-scroll p-3 space-y-2" id="diary-list-container">
                            ${diaryData.map(item => `
                                <div onclick="window.loadDiary('${item.id}')" class="cursor-pointer p-4 rounded-xl transition-all duration-300 border ${item.id === activeDiaryId ? 'bg-diaryBg border-diaryHighlight/50 shadow-md' : 'bg-transparent border-transparent hover:bg-white/5'} flex flex-col gap-1 group relative">
                                    <span class="text-xs text-gray-400 font-medium bengali-text flex items-center gap-2"><i class="fa-regular fa-calendar text-diaryHighlight/70"></i> ${item.displayDate}</span>
                                    <span class="text-sm font-bold text-diaryText truncate bengali-text">${item.title || 'শিরোনামহীন দিন...'}</span>
                                    <button onclick="event.stopPropagation(); window.deleteDiary('${item.id}')" class="absolute right-3 top-4 text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash-can"></i></button>
                                </div>
                            `).join('')}
                        </div>
                    </div>

                    <div class="w-full md:w-2/3 flex flex-col relative bg-gradient-to-br from-diaryBg to-[#111115]">
                        <div class="absolute top-4 right-6 flex items-center gap-2">
                            <span id="save-status" class="text-xs font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-full opacity-0 transition-opacity duration-300"><i class="fa-solid fa-check-circle"></i> সেভ হয়েছে</span>
                        </div>
                        
                        <div class="p-8 md:p-12 flex-grow flex flex-col h-full overflow-hidden">
                            <div class="text-diaryHighlight/80 font-semibold mb-3 tracking-wider text-sm bengali-text"><i class="fa-regular fa-clock"></i> ${activeEntry.displayDate}</div>
                            
                            <input type="text" id="diary-title" value="${activeEntry.title}" class="bg-transparent text-2xl md:text-3xl font-bold text-diaryText outline-none mb-6 placeholder-gray-600 bengali-text border-b border-transparent focus:border-diaryHighlight/30 pb-2 transition-colors" placeholder="আজকের বিশেষ শিরোনাম..." oninput="window.triggerDiarySave()">
                            
                            <textarea id="diary-content" class="w-full flex-grow bg-transparent text-base md:text-lg text-gray-300 outline-none resize-none placeholder-gray-600/70 bengali-text leading-[2] diary-scroll pr-2" placeholder="আজকের দিনটি কেমন কাটলো? মন খুলে লিখুন..." oninput="window.triggerDiarySave()">${activeEntry.content}</textarea>
                        </div>
                    </div>
                </div>
            `;
            mainContent.innerHTML = html;
        }

        window.loadDiary = function(id) {
            activeDiaryId = id;
            renderPremiumDiary();
        }

        window.createNewDiary = function() {
            const dateStr = prompt("নতুন এন্ট্রির তারিখ দিন (যেমন: ২০ মার্চ, ২০২৬):", getTodayDateString());
            if(!dateStr) return;
            
            let diaryData = getDiaryData();
            const newId = 'diary_' + Date.now();
            diaryData.unshift({
                id: newId,
                dateKey: Date.now().toString(), // Custom sorting key
                displayDate: dateStr,
                title: '',
                content: '',
                timestamp: Date.now()
            });
            saveDiaryData(diaryData);
            activeDiaryId = newId;
            renderPremiumDiary();
        }

        window.triggerDiarySave = function() {
            const status = document.getElementById('save-status');
            status.innerHTML = '<i class="fa-solid fa-pen-nib animate-pulse"></i> লিখছেন...';
            status.className = "text-xs font-medium text-diaryHighlight bg-diaryHighlight/10 px-3 py-1 rounded-full opacity-100 transition-opacity duration-300";

            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const title = document.getElementById('diary-title').value;
                const content = document.getElementById('diary-content').value;
                
                let diaryData = getDiaryData();
                const index = diaryData.findIndex(d => d.id === activeDiaryId);
                if(index !== -1) {
                    diaryData[index].title = title;
                    diaryData[index].content = content;
                    saveDiaryData(diaryData);
                    
                    // Update sidebar title silently without full re-render to keep focus
                    renderSidebarOnly(diaryData);
                }

                status.innerHTML = '<i class="fa-solid fa-check-double"></i> সেভড';
                status.className = "text-xs font-medium text-emerald-400 bg-emerald-400/10 px-3 py-1 rounded-full opacity-100 transition-opacity duration-300";
                
                setTimeout(() => { status.style.opacity = '0'; }, 2000);
            }, 800); // Save 800ms after user stops typing
        }

        function renderSidebarOnly(diaryData) {
            const container = document.getElementById('diary-list-container');
            if(!container) return;
            container.innerHTML = diaryData.map(item => `
                <div onclick="window.loadDiary('${item.id}')" class="cursor-pointer p-4 rounded-xl transition-all duration-300 border ${item.id === activeDiaryId ? 'bg-diaryBg border-diaryHighlight/50 shadow-md' : 'bg-transparent border-transparent hover:bg-white/5'} flex flex-col gap-1 group relative">
                    <span class="text-xs text-gray-400 font-medium bengali-text flex items-center gap-2"><i class="fa-regular fa-calendar text-diaryHighlight/70"></i> ${item.displayDate}</span>
                    <span class="text-sm font-bold text-diaryText truncate bengali-text">${item.title || 'শিরোনামহীন দিন...'}</span>
                    <button onclick="event.stopPropagation(); window.deleteDiary('${item.id}')" class="absolute right-3 top-4 text-gray-500 hover:text-red-400 opacity-0 group-hover:opacity-100 transition"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `).join('');
        }

        window.deleteDiary = function(id) {
            if(confirm('এই দিনের ডায়েরি মুছে ফেলতে চান?')) {
                let diaryData = getDiaryData();
                diaryData = diaryData.filter(d => d.id !== id);
                saveDiaryData(diaryData);
                if(activeDiaryId === id) activeDiaryId = null;
                renderPremiumDiary();
            }
        }

        // ==========================================
        //         ADMIN PANEL (Firebase Only)
        // ==========================================
        function renderAdminLogin() {
            mainContent.innerHTML = `
                <div class="max-w-md mx-auto bg-white dark:bg-nightCard p-8 rounded-2xl shadow-xl mt-10 text-center border-t-4 border-blue-600">
                    <h2 class="text-2xl font-bold mb-4 bengali-text dark:text-white">অ্যাডমিন প্যানেল</h2>
                    <input type="password" id="admin-pass" placeholder="পাসওয়ার্ড..." class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none text-center tracking-widest mb-4 bg-gray-50 dark:bg-night dark:text-white">
                    <button onclick="window.checkAdminPass()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-xl bengali-text">লগইন করুন</button>
                    <p id="admin-error" class="text-red-500 mt-4 hidden bengali-text">পাসওয়ার্ড ভুল!</p>
                </div>
            `;
        }

        window.checkAdminPass = function() {
            if(document.getElementById('admin-pass').value === '7284') {
                isAdminLoggedIn = true; renderAdminPanel();
            } else {
                document.getElementById('admin-error').classList.remove('hidden');
            }
        };

        function renderAdminPanel() {
            mainContent.innerHTML = `
                <div class="max-w-3xl mx-auto bg-white dark:bg-nightCard p-8 rounded-2xl shadow-lg border border-gray-100 dark:border-nightBorder">
                    <h2 class="text-2xl font-bold text-blue-600 mb-6 bengali-text">পড়ার ডাটা যুক্ত করুন (Firebase)</h2>
                    <form id="admin-form" class="space-y-4 bengali-text">
                        <select id="admin-main-cat" required class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 bg-gray-50 dark:bg-night dark:text-white">
                            <option value="">মূল ক্যাটাগরি...</option>
                            ${Object.keys(categories).map(k => `<option value="${k}">${categories[k].label}</option>`).join('')}
                        </select>
                        <select id="admin-sub-cat" required class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 bg-gray-50 dark:bg-night dark:text-white"><option value="">সাব-ক্যাটাগরি...</option></select>
                        <input type="text" id="admin-title" required placeholder="শিরোনাম..." class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 bg-gray-50 dark:bg-night dark:text-white">
                        <textarea id="admin-content" rows="5" placeholder="বিস্তারিত লেখা..." class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 bg-gray-50 dark:bg-night dark:text-white"></textarea>
                        <button type="submit" id="admin-submit-btn" class="w-full bg-indigo-600 text-white font-bold py-3 rounded-xl">সেভ করুন</button>
                        <p id="admin-status" class="text-center font-bold mt-2 hidden"></p>
                    </form>
                </div>
            `;

            document.getElementById('admin-main-cat').addEventListener('change', (e) => {
                const subSel = document.getElementById('admin-sub-cat');
                subSel.innerHTML = '';
                if(categories[e.target.value]) {
                    categories[e.target.value].subs.forEach(sub => {
                        subSel.innerHTML += `<option value="${sub}">${sub}</option>`;
                    });
                }
            });

            document.getElementById('admin-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const btn = document.getElementById('admin-submit-btn');
                const status = document.getElementById('admin-status');
                btn.disabled = true; btn.innerText = "সেভ হচ্ছে...";
                
                try {
                    await addDoc(collection(db, 'artifacts', SYNC_APP_ID, 'public', 'data', 'psc_materials'), {
                        mainCategory: document.getElementById('admin-main-cat').value,
                        subCategory: document.getElementById('admin-sub-cat').value,
                        title: document.getElementById('admin-title').value,
                        content: document.getElementById('admin-content').value,
                        createdAt: serverTimestamp()
                    });
                    status.className = "text-center font-bold mt-2 text-green-500 block";
                    status.innerText = "সফলভাবে ফায়ারবেসে সেভ হয়েছে!";
                    document.getElementById('admin-form').reset();
                } catch(err) {
                    status.className = "text-center font-bold mt-2 text-red-500 block";
                    status.innerText = "ত্রুটি: " + err.message;
                }
                btn.disabled = false; btn.innerText = "সেভ করুন";
                setTimeout(() => status.classList.add('hidden'), 3000);
            });
        }

        // Reader Global Functions 
        window.openReaderUI = function(item, isBengali) {
            const modal = document.getElementById('reader-modal');
            document.getElementById('reader-title').innerText = item.title;
            const contentEl = document.getElementById('reader-content');
            
            if(isBengali) {
                document.getElementById('reader-title').classList.add('bengali-text');
                contentEl.classList.add('bengali-text');
            } else {
                document.getElementById('reader-title').classList.remove('bengali-text');
                contentEl.classList.remove('bengali-text');
            }
            
            contentEl.innerHTML = item.content ? item.content.split('\n').map(p => p.trim() ? `<p class="indent-8 text-justify mb-4">${p}</p>` : '').join('') : '<p>কোনো টেক্সট নেই!</p>';
            
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); document.getElementById('reader-container').classList.remove('scale-95'); }, 10);
        };

        window.closeReaderUI = function() {
            document.getElementById('reader-modal').classList.add('opacity-0');
            document.getElementById('reader-container').classList.add('scale-95');
            setTimeout(() => document.getElementById('reader-modal').classList.add('hidden'), 300);
        };

        init();
    </script>
</body>
</html>
