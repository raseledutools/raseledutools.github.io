<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PSC Preparation Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Tailwind config for custom Dark Mode colors
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        night: '#333333', // User's requested solid dark gray
                        nightCard: '#404040',
                        nightBorder: '#4a4a4a'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts for UI and Bengali Text -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Bengali:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Poppins', sans-serif; 
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        /* Light mode pattern */
        body:not(.dark) {
            background-color: #f0f4f8; 
            /* Gradient and dots removed as requested */
        }
        
        .bengali-text { font-family: 'Noto Serif Bengali', serif; }
        
        /* Glassmorphism Navbar */
        .glass-nav { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            border-bottom: 1px solid rgba(255,255,255,0.3); 
        }
        .dark .glass-nav {
            background: rgba(42, 42, 42, 0.85);
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Modern Tabs */
        .tab-btn { position: relative; transition: all 0.3s ease; }
        
        /* Eye Friendly Book Reader */
        .modal { transition: opacity 0.4s ease; }
        .book-reader { 
            background-color: #fcf5e5; /* Eye-friendly paper color */
            color: #2c2820; 
            background-image: linear-gradient(to right, rgba(0,0,0,0.02) 1px, transparent 1px);
        }
        .dark .book-reader {
            background-color: #2d2d2d;
            color: #e5e7eb;
            background-image: none;
        }
        .book-title { 
            color: #8b0000; 
            border-bottom: 2px dashed #d3c3a5; 
            padding-bottom: 15px; 
            margin-bottom: 25px;
        }
        .dark .book-title {
            color: #fca5a5; /* Light red for dark mode */
            border-bottom: 2px dashed #555555;
            text-shadow: none;
        }
        #reader-content p { margin-bottom: 1.5rem; line-height: 1.85; }

        /* Loader */
        .spinner { border: 4px solid rgba(0,0,0,0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #8b5cf6; animation: spin 1s linear infinite; }
        .dark .spinner { border: 4px solid rgba(255,255,255,0.1); border-left-color: #a78bfa; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        .dark ::-webkit-scrollbar-thumb { background: #666; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #888; }
    </style>
</head>
<body class="text-gray-800 dark:text-gray-100 dark:bg-night h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="glass-nav shadow-sm z-10 sticky top-0">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between items-center py-4">
                <div class="text-2xl font-bold flex items-center gap-2 text-blue-600 dark:text-blue-400">
                    <i class="fa-solid fa-book-open-reader"></i> PSC Portal
                </div>
                
                <div class="flex items-center gap-4">
                    <!-- Night Mode Toggle -->
                    <button id="theme-toggle" class="text-gray-500 dark:text-yellow-400 hover:text-purple-600 dark:hover:text-yellow-300 focus:outline-none transition text-xl w-10 h-10 rounded-full flex items-center justify-center bg-gray-100 dark:bg-nightCard shadow-inner">
                        <i id="theme-icon" class="fa-solid fa-moon"></i>
                    </button>

                    <!-- Mobile menu button -->
                    <div class="md:hidden flex items-center">
                        <button id="mobile-menu-btn" class="text-gray-500 dark:text-gray-300 hover:text-purple-600 focus:outline-none transition">
                            <i class="fa-solid fa-bars text-2xl"></i>
                        </button>
                    </div>
                </div>
            </div>
            
            <!-- Tabs -->
            <div id="nav-tabs" class="hidden md:flex flex-wrap gap-2 md:gap-4 overflow-x-auto pb-2 mt-2">
                <!-- Tabs will be generated here by JS -->
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="flex-grow p-4 md:p-8 overflow-y-auto w-full max-w-7xl mx-auto" id="main-content">
        <div class="flex justify-center items-center h-full" id="global-loader">
            <div class="spinner"></div>
            <span class="ml-4 text-lg font-medium text-gray-500 dark:text-gray-400">ডাটা লোড হচ্ছে...</span>
        </div>
    </main>

    <!-- Reader Modal (Interactive Book UI) -->
    <div id="reader-modal" class="fixed inset-0 bg-gray-900 bg-opacity-80 z-50 hidden flex flex-col opacity-0 backdrop-blur-sm">
        <div class="bg-white dark:bg-[#252525] w-full h-full md:w-4/5 md:h-[90%] md:m-auto md:rounded-xl shadow-2xl flex flex-col overflow-hidden transform transition-transform duration-300 scale-95" id="reader-container">
            
            <!-- Modal Header (Toolbar) -->
            <div class="bg-gray-800 dark:bg-nightCard text-white p-3 md:p-4 flex justify-between items-center shrink-0 shadow-md border-b border-gray-700">
                <div class="flex items-center gap-2 text-gray-300">
                    <i class="fa-solid fa-glasses text-purple-400"></i> <span class="hidden md:inline text-sm font-medium tracking-wide">রিডিং মুড</span>
                </div>
                
                <div class="flex items-center gap-2 md:gap-4">
                    <!-- Zoom Controls -->
                    <div class="bg-gray-700 dark:bg-night rounded-lg flex items-center px-1 py-1 shadow-inner border border-gray-600 dark:border-nightBorder">
                        <button onclick="zoomText(-1)" class="w-8 h-8 rounded-md hover:bg-gray-600 dark:hover:bg-nightCard flex justify-center items-center text-xl transition" title="Zoom Out"><i class="fa-solid fa-minus text-sm"></i></button>
                        <span class="px-3 text-sm font-bold text-gray-300 select-none" id="zoom-level">100%</span>
                        <button onclick="zoomText(1)" class="w-8 h-8 rounded-md hover:bg-gray-600 dark:hover:bg-nightCard flex justify-center items-center text-xl transition" title="Zoom In"><i class="fa-solid fa-plus text-sm"></i></button>
                    </div>

                    <a id="reader-pdf-btn" href="#" target="_blank" class="hidden bg-red-600 text-white px-4 py-2 rounded-lg shadow hover:bg-red-500 text-sm font-semibold transition flex items-center gap-2">
                        <i class="fa-solid fa-file-pdf"></i> <span class="hidden md:inline">PDF</span>
                    </a>
                    <button onclick="closeReader()" class="w-10 h-10 rounded-lg bg-gray-700 dark:bg-night hover:bg-red-500 dark:hover:bg-red-600 hover:text-white transition text-xl flex justify-center items-center border border-gray-600 dark:border-nightBorder">&times;</button>
                </div>
            </div>

            <!-- Modal Body (The Book Page) -->
            <div class="p-6 md:p-12 overflow-y-auto flex-grow book-reader shadow-inner relative" id="reader-wrapper">
                <!-- Book content -->
                <div class="max-w-3xl mx-auto">
                    <h1 id="reader-title" class="text-3xl md:text-4xl font-bold book-title bengali-text text-center leading-snug">Title</h1>
                    <div id="reader-content" class="text-lg md:text-xl font-medium bengali-text transition-all duration-300 text-justify">
                        <!-- Text content goes here -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK (Modular) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Offline Service Worker Setup ---
        const swCode = `
            const CACHE_NAME = 'psc-portal-offline-v1';
            self.addEventListener('install', e => {
                e.waitUntil(caches.open(CACHE_NAME).then(c => c.addAll(['/'])));
            });
            self.addEventListener('fetch', e => {
                e.respondWith(
                    caches.match(e.request).then(res => {
                        return res || fetch(e.request).then(fetchRes => {
                            return caches.open(CACHE_NAME).then(c => {
                                if(e.request.url.startsWith('http') && e.request.method === 'GET') {
                                    c.put(e.request, fetchRes.clone());
                                }
                                return fetchRes;
                            });
                        });
                    }).catch(() => caches.match('/'))
                );
            });
        `;
        const blob = new Blob([swCode], {type: 'application/javascript'});
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register(swUrl).catch(err => console.log('SW registration failed:', err));
        }

        // Theme Setup
        const themeToggleBtn = document.getElementById('theme-toggle');
        const themeIcon = document.getElementById('theme-icon');
        
        // Check saved theme or set to night mode by default if preferred
        if (localStorage.getItem('theme') === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
        } else {
            document.documentElement.classList.remove('dark');
            themeIcon.classList.replace('fa-sun', 'fa-moon');
        }

        themeToggleBtn.addEventListener('click', () => {
            document.documentElement.classList.toggle('dark');
            if(document.documentElement.classList.contains('dark')) {
                localStorage.setItem('theme', 'dark');
                themeIcon.classList.replace('fa-moon', 'fa-sun');
            } else {
                localStorage.setItem('theme', 'light');
                themeIcon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // Configurations
        const firebaseConfig = {
            apiKey: "AIzaSyDGd3KAo45UuqmeGFALziz_oKm3htEASHY",
            authDomain: "mywebtools-f8d53.firebaseapp.com",
            projectId: "mywebtools-f8d53",
            storageBucket: "mywebtools-f8d53.firebasestorage.app",
            messagingSenderId: "979594414301",
            appId: "1:979594414301:web:7048c995e56e331a85f334"
        };
        const SYNC_APP_ID = "rasel-mia-universal-sync";
        const CLOUDINARY_URL = "https://api.cloudinary.com/v1_1/de2w78yxh/auto/upload";
        const CLOUDINARY_PRESET = "ml_default";

        // Categories Translated to Bengali & Beautiful Icons
        const categories = {
            bangla: {
                label: "বাংলা", icon: "fa-language text-green-500",
                subs: ["প্রবন্ধ", "ভাব সম্প্রসারণ", "পত্র ও দরখাস্ত", "সারাংশ ও সারমর্ম", "অনুবাদ", "ব্যাকরণ"]
            },
            english: {
                label: "English", icon: "fa-a text-blue-500",
                subs: ["Essay", "Letter & Application", "Passage", "Grammar", "Paragraph"]
            },
            bd_affairs: { label: "বাংলাদেশ বিষয়াবলি", icon: "fa-map-location-dot text-red-500", subs: ["সাধারণ জ্ঞান", "ইতিহাস", "ভূগোল"] },
            int_affairs: { label: "আন্তর্জাতিক বিষয়াবলি", icon: "fa-earth-americas text-teal-500", subs: ["সাধারণ জ্ঞান", "সংস্থা ও চুক্তি"] },
            science_ict: { label: "বিজ্ঞান ও প্রযুক্তি", icon: "fa-microchip text-indigo-500", subs: ["সাধারণ বিজ্ঞান", "কম্পিউটার ও তথ্যপ্রযুক্তি"] },
            eee: { label: "EEE ডিপার্টমেন্ট", icon: "fa-bolt text-yellow-500", subs: ["Electrical", "Electronics", "Telecommunication"] }
        };

        // State
        let currentTab = 'bangla';
        let currentSub = '';
        let allData = [];
        let userAuth = null;
        let isAdminLoggedIn = false;

        // Firebase Init
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // UI Elements
        const navTabs = document.getElementById('nav-tabs');
        const mainContent = document.getElementById('main-content');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');

        // Mobile menu toggle
        mobileMenuBtn.addEventListener('click', () => {
            navTabs.classList.toggle('hidden');
        });

        // Initialize App
        async function init() {
            // Setup initial history state for back button
            history.replaceState({ tab: 'bangla', sub: '', readerOpen: false }, "", "");
            
            // Handle physical/browser back button smoothly
            window.addEventListener('popstate', (e) => {
                if (e.state) {
                    currentTab = e.state.tab || 'bangla';
                    currentSub = e.state.sub || '';
                    
                    renderNavigation();
                    
                    if (e.state.readerOpen && e.state.item) {
                        openReaderUI(e.state.item, currentTab !== 'english');
                    } else {
                        closeReaderUI();
                        renderContent();
                    }
                }
            });

            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        userAuth = user;
                        fetchData();
                        renderNavigation();
                    }
                });
            } catch (error) {
                console.error("Auth error:", error);
                mainContent.innerHTML = `<div class="text-red-500 text-center mt-10">Authentication failed. Please check internet connection.</div>`;
            }
        }

        // Fetch Data from Firestore
        function fetchData() {
            if (!userAuth) return;
            const dataRef = collection(db, 'artifacts', SYNC_APP_ID, 'public', 'data', 'psc_materials');
            
            onSnapshot(dataRef, (snapshot) => {
                allData = [];
                snapshot.forEach((doc) => {
                    allData.push({ id: doc.id, ...doc.data() });
                });
                allData.sort((a, b) => {
                    const timeA = a.createdAt?.toMillis() || 0;
                    const timeB = b.createdAt?.toMillis() || 0;
                    return timeB - timeA;
                });
                renderContent();
            }, (error) => {
                console.error("Data fetch error:", error);
            });
        }

        // Render Top Navigation
        function renderNavigation() {
            navTabs.innerHTML = '';
            
            Object.keys(categories).forEach(catKey => {
                const btn = document.createElement('button');
                btn.className = `tab-btn py-2.5 px-5 rounded-xl text-sm md:text-base whitespace-nowrap focus:outline-none flex items-center gap-2 transition-all font-semibold shadow-sm border ${currentTab === catKey ? 'bg-blue-600 text-white border-blue-600' : 'bg-white dark:bg-nightCard text-gray-700 dark:text-gray-200 border-gray-200 dark:border-nightBorder hover:bg-gray-100 dark:hover:bg-gray-700'}`;
                btn.innerHTML = `<i class="fa-solid ${categories[catKey].icon} ${currentTab === catKey ? 'text-white' : ''}"></i> <span class="${catKey !== 'english' ? 'bengali-text font-medium' : ''}">${categories[catKey].label}</span>`;
                btn.onclick = () => {
                    currentTab = catKey;
                    currentSub = ''; 
                    history.pushState({ tab: currentTab, sub: currentSub, readerOpen: false }, "", "");
                    renderNavigation();
                    renderContent();
                    if(window.innerWidth < 768) navTabs.classList.add('hidden');
                };
                navTabs.appendChild(btn);
            });

            // Admin Tab
            const adminBtn = document.createElement('button');
            adminBtn.className = `tab-btn py-2.5 px-5 rounded-xl text-sm md:text-base whitespace-nowrap focus:outline-none flex items-center gap-2 transition-all font-semibold shadow-sm border ${currentTab === 'admin' ? 'bg-red-600 text-white border-red-600' : 'bg-white dark:bg-nightCard text-red-600 dark:text-red-400 border-gray-200 dark:border-nightBorder hover:bg-gray-100 dark:hover:bg-gray-700'}`;
            adminBtn.innerHTML = '<i class="fa-solid fa-shield-halved"></i> <span class="bengali-text font-medium">অ্যাডমিন</span>';
            adminBtn.onclick = () => {
                currentTab = 'admin';
                currentSub = '';
                history.pushState({ tab: currentTab, sub: currentSub, readerOpen: false }, "", "");
                renderNavigation();
                renderContent();
                if(window.innerWidth < 768) navTabs.classList.add('hidden');
            };
            navTabs.appendChild(adminBtn);
        }

        // Main Content Router
        function renderContent() {
            mainContent.innerHTML = ''; 

            if (currentTab === 'admin') {
                if(isAdminLoggedIn) {
                    renderAdminPanel();
                } else {
                    renderAdminLogin();
                }
                return;
            }

            const catData = categories[currentTab];
            const isBengali = currentTab !== 'english';
            
            // Headline with vibrant solid color
            const header = document.createElement('h1');
            header.className = `text-3xl md:text-4xl font-bold mb-8 text-blue-700 dark:text-blue-400 border-b-2 border-gray-200 dark:border-nightBorder pb-3 flex items-center gap-3 w-fit ${isBengali ? 'bengali-text' : ''}`;
            header.innerHTML = `<i class="fa-solid ${catData.icon}"></i> ${catData.label}`;
            mainContent.appendChild(header);

            // Subcategories Grid
            if (currentSub === '') {
                const grid = document.createElement('div');
                grid.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6';
                
                // Different solid colors for buttons/cards
                const cardColors = [
                    'bg-blue-600 hover:bg-blue-700',
                    'bg-emerald-600 hover:bg-emerald-700',
                    'bg-rose-600 hover:bg-rose-700',
                    'bg-violet-600 hover:bg-violet-700',
                    'bg-amber-600 hover:bg-amber-700',
                    'bg-cyan-600 hover:bg-cyan-700',
                    'bg-pink-600 hover:bg-pink-700',
                    'bg-teal-600 hover:bg-teal-700'
                ];
                
                catData.subs.forEach((sub, index) => {
                    const colorClass = cardColors[index % cardColors.length];
                    
                    const card = document.createElement('div');
                    card.className = `${colorClass} p-6 rounded-2xl shadow-md hover:shadow-xl transition-all duration-300 cursor-pointer flex flex-col justify-between transform hover:-translate-y-1 relative overflow-hidden`;
                    card.onclick = () => { 
                        currentSub = sub; 
                        history.pushState({ tab: currentTab, sub: currentSub, readerOpen: false }, "", "");
                        renderContent(); 
                    };

                    const titleWrapper = document.createElement('div');
                    titleWrapper.className = 'relative z-10 flex justify-between items-start';

                    const title = document.createElement('h3');
                    title.className = `text-xl font-bold text-white transition-colors ${isBengali ? 'bengali-text' : ''}`;
                    title.innerText = sub;
                    
                    const count = allData.filter(d => d.mainCategory === currentTab && d.subCategory === sub).length;
                    const badge = document.createElement('span');
                    badge.className = 'bg-black/20 text-white text-xs font-bold px-3 py-1 rounded-full shadow-sm backdrop-blur-sm';
                    badge.innerText = count + " টি";

                    titleWrapper.appendChild(title);
                    titleWrapper.appendChild(badge);
                    
                    const iconBottom = document.createElement('div');
                    iconBottom.className = 'mt-6 text-white/70 hover:text-white transition-colors text-right relative z-10';
                    iconBottom.innerHTML = '<i class="fa-solid fa-arrow-right-long text-xl"></i>';

                    card.appendChild(titleWrapper);
                    card.appendChild(iconBottom);
                    grid.appendChild(card);
                });
                mainContent.appendChild(grid);
            } else {
                // Show Items List
                const backBtn = document.createElement('button');
                backBtn.className = `mb-6 text-white font-bold flex items-center gap-2 transition bg-indigo-600 hover:bg-indigo-700 px-6 py-3 rounded-xl w-fit shadow-md ${isBengali ? 'bengali-text' : ''}`;
                backBtn.innerHTML = `<i class="fa-solid fa-arrow-left"></i> ফিরে যান (${catData.label})`;
                backBtn.onclick = () => { 
                    currentSub = ''; 
                    history.pushState({ tab: currentTab, sub: currentSub, readerOpen: false }, "", "");
                    renderContent(); 
                };
                mainContent.appendChild(backBtn);

                const subHeader = document.createElement('h2');
                subHeader.className = `text-2xl font-bold mb-6 text-blue-800 dark:text-blue-300 bg-white dark:bg-nightCard p-4 rounded-xl shadow-sm border-l-4 border-blue-500 dark:border-blue-400 ${isBengali ? 'bengali-text' : ''}`;
                subHeader.innerText = currentSub;
                mainContent.appendChild(subHeader);

                const items = allData.filter(d => d.mainCategory === currentTab && d.subCategory === currentSub);

                if (items.length === 0) {
                    mainContent.innerHTML += `<div class="text-gray-500 dark:text-gray-400 p-10 bg-white dark:bg-nightCard rounded-xl shadow-sm text-center border border-dashed border-gray-300 dark:border-nightBorder bengali-text text-lg"><i class="fa-regular fa-folder-open text-4xl mb-3 text-gray-300 dark:text-gray-600 block"></i>এই বিভাগে এখনো কোনো তথ্য যুক্ত করা হয়নি।</div>`;
                    return;
                }

                const listContainer = document.createElement('div');
                listContainer.className = 'space-y-4';

                // Array of colors for the item list
                const listColors = [
                    'bg-blue-600 hover:bg-blue-700',
                    'bg-emerald-600 hover:bg-emerald-700',
                    'bg-rose-600 hover:bg-rose-700',
                    'bg-violet-600 hover:bg-violet-700',
                    'bg-amber-600 hover:bg-amber-700',
                    'bg-cyan-600 hover:bg-cyan-700',
                    'bg-pink-600 hover:bg-pink-700',
                    'bg-teal-600 hover:bg-teal-700'
                ];

                items.forEach((item, index) => {
                    const colorClass = listColors[index % listColors.length];
                    const itemDiv = document.createElement('div');
                    itemDiv.className = `${colorClass} p-5 rounded-2xl shadow-md hover:shadow-xl flex flex-col md:flex-row md:justify-between md:items-center transition-all group cursor-pointer transform hover:-translate-y-1`;
                    
                    const titleDiv = document.createElement('div');
                    titleDiv.className = `font-bold text-white text-xl flex-grow mb-4 md:mb-0 ${isBengali ? 'bengali-text' : ''}`;
                    titleDiv.innerHTML = `<i class="fa-solid fa-file-lines text-white/70 mr-3"></i> ${item.title}`;
                    titleDiv.onclick = () => openReader(item, isBengali);
                    
                    const iconsDiv = document.createElement('div');
                    iconsDiv.className = 'flex flex-wrap gap-3 text-sm items-center';
                    
                    if(item.content) {
                        iconsDiv.innerHTML += '<button onclick="openReader('+JSON.stringify(item).replace(/"/g, '&quot;')+','+isBengali+')" class="bg-white/20 text-white border border-white/30 px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-white/30 transition shadow-sm backdrop-blur-sm"><i class="fa-solid fa-book-open"></i> পড়ুন</button>';
                    }
                    if(item.pdfUrl) {
                        iconsDiv.innerHTML += `<a href="${item.pdfUrl}" target="_blank" class="bg-black/30 text-white border border-black/20 px-5 py-2.5 rounded-xl font-bold flex items-center gap-2 hover:bg-black/40 transition shadow-sm backdrop-blur-sm"><i class="fa-solid fa-file-pdf"></i> PDF</a>`;
                    }

                    itemDiv.appendChild(titleDiv);
                    itemDiv.appendChild(iconsDiv);
                    listContainer.appendChild(itemDiv);
                });

                mainContent.appendChild(listContainer);
            }
        }

        // Admin Login Screen
        function renderAdminLogin() {
            mainContent.innerHTML = `
                <div class="max-w-md mx-auto bg-white dark:bg-nightCard p-8 rounded-2xl shadow-xl mt-10 text-center border-t-4 border-blue-600 relative overflow-hidden">

                        <i class="fa-solid fa-user-shield text-4xl text-blue-600 dark:text-blue-400"></i>
                    </div>
                    
                    <h2 class="text-2xl font-bold mb-2 text-gray-800 dark:text-white bengali-text">অ্যাডমিন প্যানেল</h2>
                    <p class="text-gray-500 dark:text-gray-400 mb-8 text-sm bengali-text">প্রবেশ করতে পাসওয়ার্ড দিন</p>
                    
                    <form id="login-form" onsubmit="event.preventDefault(); window.checkAdminPass();">
                        <input type="password" id="admin-pass" placeholder="পাসওয়ার্ড..." class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-4 focus:ring-2 focus:ring-blue-500 dark:focus:ring-blue-400 outline-none transition text-center text-xl tracking-widest shadow-sm mb-4 bg-gray-50 dark:bg-night dark:text-white">
                        <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-4 rounded-xl text-lg bengali-text shadow-lg transition-colors"><i class="fa-solid fa-right-to-bracket mr-2"></i> লগইন করুন</button>
                    </form>
                    <p id="admin-error" class="text-red-500 dark:text-red-400 mt-4 hidden font-medium bengali-text bg-red-50 dark:bg-red-900/20 p-2 rounded-lg border border-red-100 dark:border-red-900/50"><i class="fa-solid fa-circle-exclamation"></i> পাসওয়ার্ড ভুল হয়েছে!</p>
                </div>
            `;
            setTimeout(() => document.getElementById('admin-pass').focus(), 100);
        }

        window.checkAdminPass = function() {
            const pass = document.getElementById('admin-pass').value;
            if(pass === '7284') {
                isAdminLoggedIn = true;
                renderAdminPanel();
            } else {
                const err = document.getElementById('admin-error');
                err.classList.remove('hidden');
                err.classList.add('animate-pulse');
                setTimeout(() => err.classList.remove('animate-pulse'), 500);
            }
        };

        // Render Admin Panel
        function renderAdminPanel() {
            const html = `
                <div class="max-w-4xl mx-auto space-y-8">
                    <!-- Upload Data Section -->
                    <div class="bg-white dark:bg-nightCard p-8 rounded-2xl shadow-lg border border-gray-100 dark:border-nightBorder relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-40 h-40 bg-blue-50 dark:bg-blue-900/10 rounded-bl-full -z-10"></div>
                        <div class="flex justify-between items-center mb-8 border-b-2 border-gray-100 dark:border-nightBorder pb-4">
                            <h2 class="text-2xl font-bold text-blue-700 dark:text-blue-400 bengali-text flex items-center gap-2"><i class="fa-solid fa-cloud-arrow-up text-blue-500"></i> নতুন ডাটা যুক্ত করুন</h2>
                            <button onclick="window.logoutAdmin()" class="text-white bg-red-500 hover:bg-red-600 transition text-sm font-semibold bengali-text px-4 py-2 rounded-lg shadow-sm"><i class="fa-solid fa-power-off"></i> লগআউট</button>
                        </div>
                        
                        <form id="admin-form" class="space-y-6 bengali-text text-lg">
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">মূল ক্যাটাগরি *</label>
                                    <select id="admin-main-cat" required class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 focus:ring-2 focus:ring-purple-500 outline-none bg-gray-50 dark:bg-night dark:text-white transition">
                                        <option value="">নির্বাচন করুন</option>
                                        ${Object.keys(categories).map(k => `<option value="${k}">${categories[k].label}</option>`).join('')}
                                    </select>
                                </div>
                                
                                <div>
                                    <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">সাব-ক্যাটাগরি *</label>
                                    <select id="admin-sub-cat" required class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 focus:ring-2 focus:ring-purple-500 outline-none bg-gray-50 dark:bg-night dark:text-white transition disabled:opacity-50">
                                        <option value="">আগে মূল ক্যাটাগরি নির্বাচন করুন</option>
                                    </select>
                                </div>
                            </div>

                            <div>
                                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2">টাইটেল (শিরোনাম) *</label>
                                <input type="text" id="admin-title" required placeholder="যেমন: সময়ের মূল্য..." class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-3 focus:ring-2 focus:ring-purple-500 outline-none bg-gray-50 dark:bg-night dark:text-white transition">
                            </div>

                            <div>
                                <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300 mb-2 flex justify-between"><span>বিস্তারিত লেখা (অপশনাল)</span> <span class="text-xs text-gray-400 dark:text-gray-500 font-normal">বইয়ের মতো দেখাবে</span></label>
                                <textarea id="admin-content" rows="6" placeholder="এখানে আপনার লেখা পেস্ট করুন..." class="w-full border-2 border-gray-200 dark:border-nightBorder rounded-xl p-4 focus:ring-2 focus:ring-purple-500 outline-none bg-gray-50 dark:bg-night dark:text-white leading-relaxed transition"></textarea>
                            </div>

                            <div class="border-2 border-dashed border-blue-200 dark:border-blue-800/50 rounded-xl p-6 bg-blue-50/50 dark:bg-blue-900/10 text-center hover:bg-blue-50 dark:hover:bg-blue-900/20 transition-colors relative">
                                <i class="fa-regular fa-file-pdf text-4xl text-blue-400 dark:text-blue-500 mb-3 block"></i>
                                <label class="block text-sm font-semibold text-blue-900 dark:text-blue-300 mb-2">পিডিএফ ফাইল আপলোড (অপশনাল)</label>
                                <input type="file" id="admin-pdf" accept=".pdf" class="w-full text-sm text-gray-500 dark:text-gray-400 file:mr-4 file:py-2.5 file:px-6 file:rounded-full file:border-0 file:text-sm file:font-bold file:bg-blue-100 dark:file:bg-blue-900/50 file:text-blue-700 dark:file:text-blue-300 hover:file:bg-blue-200 dark:hover:file:bg-blue-800/50 cursor-pointer outline-none transition">
                                <p class="text-xs text-gray-400 dark:text-gray-500 mt-3 font-sans">সর্বোচ্চ সাইজ: ১০ এমবি</p>
                            </div>

                            <div class="pt-4">
                                <button type="submit" id="admin-submit-btn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-4 rounded-xl text-lg shadow-lg flex justify-center items-center transition-colors">
                                    <i class="fa-solid fa-paper-plane mr-2"></i> তথ্য সেভ করুন
                                </button>
                            </div>
                            <div id="admin-status" class="text-center text-base font-semibold hidden p-3 rounded-lg"></div>
                        </form>
                    </div>

                    <!-- Manage / Delete Data Section -->
                    <div class="bg-white dark:bg-nightCard p-8 rounded-2xl shadow-lg border border-gray-100 dark:border-nightBorder">
                        <div class="flex justify-between items-center mb-6 border-b-2 border-red-100 dark:border-nightBorder pb-4">
                            <h2 class="text-2xl font-bold text-red-600 dark:text-red-400 bengali-text flex items-center gap-2"><i class="fa-solid fa-trash-can"></i> ডাটা ডিলিট প্যানেল</h2>
                            <span class="bg-gray-100 dark:bg-night text-gray-600 dark:text-gray-400 px-3 py-1 rounded-full text-sm font-bold border border-gray-200 dark:border-nightBorder">মোট: ${allData.length} টি</span>
                        </div>
                        
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse">
                                <thead>
                                    <tr class="bg-gray-50 dark:bg-night text-gray-600 dark:text-gray-300 text-sm border-b dark:border-nightBorder">
                                        <th class="p-4 font-semibold bengali-text rounded-tl-lg">শিরোনাম (Title)</th>
                                        <th class="p-4 font-semibold bengali-text">ক্যাটাগরি</th>
                                        <th class="p-4 font-semibold bengali-text">অ্যাকশন</th>
                                    </tr>
                                </thead>
                                <tbody class="divide-y divide-gray-100 dark:divide-nightBorder">
                                    ${allData.map(item => `
                                        <tr class="hover:bg-gray-50 dark:hover:bg-night transition-colors">
                                            <td class="p-4 font-medium text-gray-800 dark:text-gray-200 ${item.mainCategory !== 'english' ? 'bengali-text' : ''}">${item.title}</td>
                                            <td class="p-4 text-sm text-gray-500 dark:text-gray-400 bengali-text">
                                                <span class="bg-blue-50 dark:bg-blue-900/30 text-blue-600 dark:text-blue-400 px-2 py-1 rounded-md border border-blue-100 dark:border-blue-800/30">${categories[item.mainCategory]?.label || item.mainCategory}</span>
                                                <i class="fa-solid fa-angle-right text-xs mx-1"></i> ${item.subCategory}
                                            </td>
                                            <td class="p-4">
                                                <button onclick="window.deleteDataItem('${item.id}', '${item.title.replace(/'/g, "\\'")}')" class="text-red-500 hover:text-white hover:bg-red-500 dark:text-red-400 dark:hover:bg-red-600 dark:hover:text-white px-3 py-1.5 rounded-lg border border-red-200 dark:border-red-900/50 transition flex items-center gap-2 text-sm font-medium bengali-text shadow-sm">
                                                    <i class="fa-solid fa-trash"></i> ডিলিট
                                                </button>
                                            </td>
                                        </tr>
                                    `).join('')}
                                    ${allData.length === 0 ? `<tr><td colspan="3" class="p-8 text-center text-gray-500 dark:text-gray-400 bengali-text italic bg-gray-50 dark:bg-night">কোনো ডাটা পাওয়া যায়নি।</td></tr>` : ''}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            `;
            mainContent.innerHTML = html;

            const mainCatSelect = document.getElementById('admin-main-cat');
            const subCatSelect = document.getElementById('admin-sub-cat');

            mainCatSelect.addEventListener('change', (e) => {
                const selected = e.target.value;
                subCatSelect.innerHTML = '';
                if (selected && categories[selected]) {
                    categories[selected].subs.forEach(sub => {
                        const opt = document.createElement('option');
                        opt.value = sub;
                        opt.innerText = sub;
                        subCatSelect.appendChild(opt);
                    });
                } else {
                    subCatSelect.innerHTML = '<option value="">আগে মূল ক্যাটাগরি নির্বাচন করুন</option>';
                }
            });

            document.getElementById('admin-form').addEventListener('submit', handleAdminSubmit);
        }

        // Global Delete Function
        window.deleteDataItem = async function(id, title) {
            if(confirm(`আপনি কি সত্যিই "${title}" মুছে ফেলতে চান? এটি আর ফিরিয়ে আনা যাবে না।`)) {
                try {
                    const docRef = doc(db, 'artifacts', SYNC_APP_ID, 'public', 'data', 'psc_materials', id);
                    await deleteDoc(docRef);
                    // Re-render admin panel to update list automatically since onSnapshot is listening
                    setTimeout(() => { if(currentTab === 'admin' && isAdminLoggedIn) renderAdminPanel(); }, 500);
                } catch (error) {
                    alert('মুছে ফেলতে সমস্যা হয়েছে: ' + error.message);
                }
            }
        }

        window.logoutAdmin = function() {
            isAdminLoggedIn = false;
            currentTab = 'bangla'; // Go back to home
            renderNavigation();
            renderContent();
        }

        async function handleAdminSubmit(e) {
            e.preventDefault();
            if(!userAuth) return;

            const btn = document.getElementById('admin-submit-btn');
            const statusDiv = document.getElementById('admin-status');
            
            const mainCategory = document.getElementById('admin-main-cat').value;
            const subCategory = document.getElementById('admin-sub-cat').value;
            const title = document.getElementById('admin-title').value;
            const content = document.getElementById('admin-content').value;
            const fileInput = document.getElementById('admin-pdf');

            btn.disabled = true;
            btn.innerHTML = '<div class="spinner border-t-white w-6 h-6 mr-3"></div> আপলোড হচ্ছে...';
            statusDiv.className = 'text-center text-sm font-semibold text-purple-700 dark:text-purple-300 mt-4 block bg-purple-50 dark:bg-purple-900/30 p-3 rounded-lg border border-purple-200 dark:border-purple-800/50';
            statusDiv.innerText = 'অনুরোধ প্রসেস করা হচ্ছে...';

            try {
                let pdfUrl = '';

                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    statusDiv.innerText = 'পিডিএফ আপলোড হচ্ছে (Cloudinary)...';
                    
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('upload_preset', CLOUDINARY_PRESET);

                    const res = await fetch(CLOUDINARY_URL, {
                        method: 'POST',
                        body: formData
                    });

                    if (!res.ok) throw new Error("Cloudinary upload failed");
                    const cloudData = await res.json();
                    pdfUrl = cloudData.secure_url;
                }

                statusDiv.innerText = 'ডাটাবেসে সেভ করা হচ্ছে...';
                const dataRef = collection(db, 'artifacts', SYNC_APP_ID, 'public', 'data', 'psc_materials');
                
                await addDoc(dataRef, {
                    mainCategory,
                    subCategory,
                    title,
                    content,
                    pdfUrl,
                    createdAt: serverTimestamp()
                });

                statusDiv.className = 'text-center text-sm font-semibold text-green-700 dark:text-green-400 mt-4 block bg-green-50 dark:bg-green-900/30 p-3 rounded-lg border border-green-200 dark:border-green-800/50';
                statusDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i> সফলভাবে সেভ হয়েছে!';
                document.getElementById('admin-form').reset();
                document.getElementById('admin-sub-cat').innerHTML = '<option value="">আগে মূল ক্যাটাগরি নির্বাচন করুন</option>';
                
                // Refresh list automatically via onSnapshot
                setTimeout(() => { if(currentTab === 'admin' && isAdminLoggedIn) renderAdminPanel(); }, 500);

            } catch (error) {
                console.error(error);
                statusDiv.className = 'text-center text-sm font-semibold text-red-700 dark:text-red-400 mt-4 block bg-red-50 dark:bg-red-900/30 p-3 rounded-lg border border-red-200 dark:border-red-800/50';
                statusDiv.innerText = 'ত্রুটি: ' + error.message;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> তথ্য সেভ করুন';
                setTimeout(() => { if(statusDiv.classList.contains('text-green-700') || statusDiv.classList.contains('dark:text-green-400')) statusDiv.classList.add('hidden'); }, 4000);
            }
        }

        // --- Reader Global Functions (Book View & Zoom) ---
        let currentZoom = 100; // base zoom percentage
        const baseFontSizeBody = 1.125; // in rem (18px)
        const baseFontSizeTitle = 2.25; // in rem (36px)

        window.zoomText = function(step) {
            currentZoom += (step * 10);
            if(currentZoom < 70) currentZoom = 70; // Minimum zoom
            if(currentZoom > 200) currentZoom = 200; // Maximum zoom
            
            document.getElementById('zoom-level').innerText = currentZoom + '%';
            
            const scaleMultiplier = currentZoom / 100;
            document.getElementById('reader-content').style.fontSize = (baseFontSizeBody * scaleMultiplier) + 'rem';
            document.getElementById('reader-title').style.fontSize = (baseFontSizeTitle * scaleMultiplier) + 'rem';
            
            // Adjust line height slightly for bigger texts to stay readable
            document.getElementById('reader-content').style.lineHeight = (1.85 - (scaleMultiplier - 1) * 0.2); 
        };

        window.openReader = function(item, isBengali) {
            // Push state for reader
            history.pushState({ tab: currentTab, sub: currentSub, readerOpen: true, item: item }, "", "");
            openReaderUI(item, isBengali);
        };

        // Separated UI logic for back button support
        function openReaderUI(item, isBengali) {
            const modal = document.getElementById('reader-modal');
            const modalContainer = document.getElementById('reader-container');
            const titleEl = document.getElementById('reader-title');
            const contentEl = document.getElementById('reader-content');
            const pdfBtn = document.getElementById('reader-pdf-btn');

            // Reset zoom when opening a new document
            currentZoom = 100;
            document.getElementById('zoom-level').innerText = '100%';
            contentEl.style.fontSize = baseFontSizeBody + 'rem';
            titleEl.style.fontSize = baseFontSizeTitle + 'rem';
            contentEl.style.lineHeight = '1.85';

            titleEl.innerText = item.title;
            if(!isBengali) {
                titleEl.classList.remove('bengali-text');
                contentEl.classList.remove('bengali-text');
                titleEl.style.fontFamily = "'Poppins', sans-serif";
                contentEl.style.fontFamily = "'Poppins', sans-serif";
            } else {
                titleEl.classList.add('bengali-text');
                contentEl.classList.add('bengali-text');
                titleEl.style.fontFamily = ""; // fallback to class css
                contentEl.style.fontFamily = "";
            }
            
            // Format content into book paragraphs
            let formattedContent = '';
            if (item.content) {
                formattedContent = item.content.split('\n').map(p => {
                    const trimmed = p.trim();
                    if(!trimmed) return '<div class="h-4"></div>'; // paragraph spacing
                    return `<p class="indent-8 text-justify">${trimmed}</p>`; // traditional book indent
                }).join('');
            } else {
                formattedContent = `<div class="flex flex-col items-center justify-center mt-20 opacity-50"><i class="fa-solid fa-book-journal-whills text-6xl mb-4 text-gray-400 dark:text-gray-600"></i><p class="text-xl">এই অংশে কোনো টেক্সট নেই!</p></div>`;
            }
            contentEl.innerHTML = formattedContent;

            // PDF Link
            if (item.pdfUrl) {
                pdfBtn.href = item.pdfUrl;
                pdfBtn.classList.remove('hidden');
                pdfBtn.classList.add('flex');
            } else {
                pdfBtn.classList.add('hidden');
                pdfBtn.classList.remove('flex');
            }

            modal.classList.remove('hidden');
            setTimeout(() => {
                modal.classList.remove('opacity-0');
                modalContainer.classList.remove('scale-95');
                modalContainer.classList.add('scale-100');
            }, 10);
        }

        window.closeReader = function() {
            // Go back in history which will trigger popstate
            history.back();
        };

        // Separated UI logic for back button support
        function closeReaderUI() {
            const modal = document.getElementById('reader-modal');
            const modalContainer = document.getElementById('reader-container');
            
            modal.classList.add('opacity-0');
            modalContainer.classList.remove('scale-100');
            modalContainer.classList.add('scale-95');
            
            setTimeout(() => {
                modal.classList.add('hidden');
            }, 400); 
        }

        // Start App
        init();

    </script>
