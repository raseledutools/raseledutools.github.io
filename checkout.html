<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RasFocus+ Premium Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0fdfa; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 150, 160, 0.1);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="glass-card max-w-md w-full rounded-2xl overflow-hidden border border-teal-100">
        
        <div class="bg-gradient-to-r from-teal-500 to-teal-600 p-6 text-center text-white relative">
            <i class="fas fa-crown text-4xl text-yellow-300 mb-2"></i>
            <h2 class="text-2xl font-bold">RasFocus+ Premium</h2>
            <p class="text-teal-100 text-sm mt-1">Unlock Ultimate Productivity</p>
            
            <div class="absolute -bottom-5 left-1/2 transform -translate-x-1/2 bg-white text-teal-600 font-bold px-6 py-2 rounded-full shadow-lg border border-teal-50">
                ৳ 500 <span class="text-xs text-gray-500 font-normal">/ Lifetime</span>
            </div>
        </div>

        <div class="p-8 pt-10">
            
            <div class="bg-gray-50 p-3 rounded-lg border border-gray-200 mb-6 text-center">
                <p class="text-xs text-gray-500 uppercase tracking-wider font-semibold mb-1">Your Account ID</p>
                <p id="uid-display" class="text-sm font-mono text-gray-700 break-all">Loading UID...</p>
            </div>

            <ul class="space-y-3 mb-8 text-sm text-gray-600">
                <li class="flex items-center"><i class="fas fa-check-circle text-teal-500 mr-3 text-lg"></i> Strict Block Protocols</li>
                <li class="flex items-center"><i class="fas fa-check-circle text-teal-500 mr-3 text-lg"></i> Deep Study Statistics</li>
                <li class="flex items-center"><i class="fas fa-check-circle text-teal-500 mr-3 text-lg"></i> Cloud Sync & Backup</li>
                <li class="flex items-center"><i class="fas fa-check-circle text-teal-500 mr-3 text-lg"></i> Lifetime Access</li>
            </ul>

            <div id="notice-area" class="hidden mb-4 p-3 rounded text-sm text-center"></div>

            <div id="action-area">
                <button id="bkashButton" onclick="startBkashPayment()" class="w-full mb-3 bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-4 rounded-xl transition duration-200 flex items-center justify-center shadow-lg">
                    <i class="fas fa-wallet mr-2"></i> Pay with bKash
                </button>
            </div>

        </div>
    </div>

    <script>
        // ==========================================
        // ১. URL থেকে ইউজারের UID বের করা
        // ==========================================
        const urlParams = new URLSearchParams(window.location.search);
        let userUid = urlParams.get('uid');
        
        const uidDisplay = document.getElementById('uid-display');
        const noticeArea = document.getElementById('notice-area');
        const actionArea = document.getElementById('action-area');
        const bkashBtn = document.getElementById('bkashButton');

        if (userUid) {
            uidDisplay.textContent = userUid;
        } else {
            uidDisplay.textContent = "UID Not Found!";
            uidDisplay.classList.add('text-red-500');
            showNotice("Please open this page from the RasFocus Desktop App.", "error");
            actionArea.style.display = 'none'; 
        }

        // ==========================================
        // ২. অটোমেটিক বিকাশ পেমেন্ট (Railway সার্ভার)
        // ==========================================
        async function startBkashPayment() {
            if (!userUid) return;

            // বাটনে লোডিং অ্যানিমেশন দেখানো
            bkashBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Connecting to bKash...';
            bkashBtn.disabled = true;
            bkashBtn.classList.add('opacity-75', 'cursor-not-allowed');
            noticeArea.style.display = 'none';

            try {
                // Railway সার্ভারে রিকোয়েস্ট পাঠানো হচ্ছে
                const response = await fetch("https://rasfocus-backend.onrender.com/api/bkash/create", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        uid: userUid,
                        amount: "500" // তোমার প্যাকেজের দাম
                    })
                });

                const data = await response.json();

                // সার্ভার থেকে বিকাশের লিংক পেলে সাথে সাথে রিডাইরেক্ট করে দাও
                if (data.success && data.bkashURL) {
                    window.location.href = data.bkashURL; 
                } else {
                    showNotice("Payment initiation failed: " + (data.message || "Unknown error"), "error");
                    resetButton();
                }
            } catch (error) {
                console.error("Server Error:", error);
                showNotice("Server connection failed. Please try again.", "error");
                resetButton();
            }
        }

        // হেল্পার ফাংশন: বাটন আগের অবস্থায় ফিরিয়ে আনা
        function resetButton() {
            bkashBtn.innerHTML = '<i class="fas fa-wallet mr-2"></i> Pay with bKash';
            bkashBtn.disabled = false;
            bkashBtn.classList.remove('opacity-75', 'cursor-not-allowed');
        }

        // হেল্পার ফাংশন: স্ক্রিনে মেসেজ দেখানো
        function showNotice(message, type) {
            noticeArea.style.display = 'block';
            noticeArea.textContent = message;
            if (type === 'error') {
                noticeArea.className = 'mb-4 p-3 rounded text-sm text-center bg-red-100 text-red-700 border border-red-200';
            } else {
                noticeArea.className = 'mb-4 p-4 rounded text-sm text-center bg-green-100 text-green-800 border border-green-200 font-semibold shadow-inner';
            }
        }
    </script>
</body>
</html>
